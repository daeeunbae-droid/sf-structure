<!DOCTYPE html>
<html lang="ko">
<head>

<title>SF English Structure</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:#f5f7fa;color:#1e293b;-webkit-tap-highlight-color:transparent}
body{padding:12px 10px}
.ctn{max-width:540px;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:22px 18px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px}
.brand{font-size:22px;font-weight:900;color:#1B3A5C;text-align:center;cursor:default;user-select:none}
.brand-sub{font-size:11px;color:#888;text-align:center;margin-top:2px;margin-bottom:20px}
input[type=text]{width:100%;padding:12px 14px;font-size:16px;border:2px solid #ddd;border-radius:10px;outline:none;text-align:center}
input[type=text]:focus{border-color:#1B3A5C}
.btn{display:block;width:100%;padding:13px;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;text-align:center;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:default}
.bn{background:#1B3A5C;color:#fff}
.bg{background:#E8A010;color:#fff}
.br{background:#dc2626;color:#fff}
.bo{background:#fff;color:#1B3A5C;border:2px solid #1B3A5C}
.bGray{background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1}
.bGreen{background:#16a34a;color:#fff}
.bYellow{background:#fffbeb;color:#92400e;border:2px solid #fcd34d}
.pb{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden;margin-bottom:14px}
.pf{height:100%;background:linear-gradient(90deg,#1B3A5C,#E8A010);border-radius:99px;transition:width .4s}
.mode-tab{display:flex;gap:6px;margin-bottom:14px}
.mode-tab button{flex:1;padding:10px;font-size:14px;font-weight:700;border:2px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;color:#64748b;transition:all .15s}
.mode-tab button.on{border-color:#1B3A5C;background:#1B3A5C;color:#fff}
.set-item{border:2px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.set-item:hover,.set-item:active{border-color:#1B3A5C;background:#f8fafc}
.set-title{font-size:14px;font-weight:700;color:#1B3A5C}
.set-meta{font-size:11px;color:#888;margin-top:3px}
.set-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.lv-basic{background:#dbeafe;color:#1d4ed8}
.lv-mid{background:#dcfce7;color:#15803d}
.lv-adv{background:#fef3c7;color:#92400e}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{font-size:13px;font-weight:700;color:#1B3A5C}
.q-mode{font-size:12px;color:#888;font-weight:600}
.q-score{font-size:13px;font-weight:800;color:#E8A010}
.zone-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.answer-zone{min-height:60px;border:2px dashed #1B3A5C;border-radius:12px;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:14px;background:#f8fafc;transition:border-color .2s;position:relative}
.answer-zone.empty{border-color:#cbd5e1}
.zone-ph{font-size:12px;color:#cbd5e1;font-style:italic;padding:8px;width:100%;text-align:center}
.bank-zone{min-height:60px;background:#f1f5f9;border-radius:12px;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:14px}
.ck{padding:10px 15px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid;position:relative;transition:all .18s cubic-bezier(.34,1.56,.64,1);user-select:none;-webkit-user-select:none;line-height:1.3}
.ck:active{transform:scale(.91)}
@keyframes snapIn{0%{transform:scale(1.12);box-shadow:0 4px 16px rgba(27,58,92,.25)}60%{transform:scale(.97)}100%{transform:scale(1);box-shadow:none}}
.ck-snap{animation:snapIn .22s cubic-bezier(.34,1.56,.64,1) forwards}
.ck-bank{background:#fff;border-color:#cbd5e1;color:#1e293b}
.ck-bank:hover{border-color:#1B3A5C;background:#f0f4ff}
.ck-ans{background:#1B3A5C;border-color:#1B3A5C;color:#fff}
.ck-ans:hover{background:#152d4a;border-color:#152d4a}
.ck-ok{background:#f0fdf4!important;border-color:#16a34a!important;color:#16a34a!important}
.ck-no{background:#fff5f5!important;border-color:#dc2626!important;color:#dc2626!important}
.ck-lbl{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;white-space:nowrap;pointer-events:none}
.lS{background:#3b82f6;color:#fff}.lV{background:#ef4444;color:#fff}.lO{background:#10b981;color:#fff}.lC{background:#8b5cf6;color:#fff}
.lIO{background:#10b981;color:#fff}.lDO{background:#10b981;color:#fff}.lOC{background:#8b5cf6;color:#fff}.lMod{background:#f59e0b;color:#fff}
.lInf{background:#06b6d4;color:#fff}.lAdv{background:#f97316;color:#fff}.lAdvCl{background:#f97316;color:#fff}.lRelCl{background:#6366f1;color:#fff}
.lComp{background:#f59e0b;color:#fff}.lGS{background:#3b82f6;color:#fff}.lRS{background:#3b82f6;color:#fff}.lDef{background:#64748b;color:#fff}
.hint-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 12px;background:#f8fafc;border-radius:9px;border:1px solid #e2e8f0}
.hint-lbl{font-size:13px;color:#555;font-weight:600}
.sw{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#ccc;border-radius:24px;transition:.3s}
.sl::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.sw input:checked+.sl{background:#1B3A5C}
.sw input:checked+.sl::before{transform:translateX(20px)}
.fdb{padding:12px 16px;border-radius:10px;font-size:15px;font-weight:700;text-align:center;margin-top:10px}
.fdb.ok{background:#f0fdf4;color:#16a34a;border:2px solid #86efac}
.fdb.no{background:#fff5f5;color:#dc2626;border:2px solid #fca5a5}
.fdb.show{background:#fffbeb;color:#92400e;border:2px solid #fcd34d}
.fdb.disp{background:#fffbeb;color:#92400e;border:2px solid #fcd34d;font-size:13px}
.ca-box{background:#f0fdf4;border:2px solid #86efac;border-radius:10px;padding:12px;margin-top:10px}
.ca-lbl{font-size:10px;font-weight:700;color:#16a34a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ca-chunks{display:flex;flex-wrap:wrap;gap:6px}
.ca-ck{background:#16a34a;color:#fff;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:600}
.expl-box{background:#eff6ff;border-radius:10px;padding:14px;font-size:13px;line-height:1.75;color:#1e40af;margin-top:10px;border:1px solid #bfdbfe}
.expl-ttl{font-size:10px;font-weight:800;color:#1B3A5C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.pattern-badge{display:inline-block;background:#1B3A5C;color:#fff;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;font-family:monospace;letter-spacing:1px;margin-right:6px}
.concept-tag{background:#fffbeb;color:#92400e;border:1px solid #fde68a;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;display:inline-block}
.rs-score{font-size:42px;font-weight:900;color:#1B3A5C;text-align:center}
.rs-score span{font-size:18px;color:#999;font-weight:400}
.rs-pct{font-size:17px;font-weight:700;text-align:center;margin-top:4px}
.res-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1f5f9;gap:8px}
.res-row:last-child{border-bottom:none}
.res-sent{font-size:12px;color:#1e293b;line-height:1.5;flex:1}
.res-tag{flex-shrink:0;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.res-ok{background:#f0fdf4;color:#16a34a}
.res-no{background:#fff5f5;color:#dc2626}
.res-disp{background:#fffbeb;color:#92400e}
/* ── 구조 훈련 모드 — Skeleton OS ── */
/* 뼈대 가이드 바 */
.skeleton-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:9px 12px;background:#f8f9ff;border-radius:10px;border:1.5px solid #e0e7ff;margin-bottom:12px}
.sk-slot{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:800;letter-spacing:.3px;opacity:.55;transition:opacity .2s,transform .2s}
.sk-slot.sk-done{opacity:.35;text-decoration:line-through}
.sk-slot.sk-active{opacity:1;transform:scale(1.07);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.sk-s{background:#dbeafe;color:#1d4ed8}
.sk-v{background:#fee2e2;color:#b91c1c}
.sk-oc{background:#dcfce7;color:#15803d}
.sk-mod{background:#fff9ed;color:#b45309}
.sk-arrow{font-size:11px;color:#94a3b8;font-weight:700}
/* 드릴 상단 안내 배너 */
.drill-banner{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:linear-gradient(135deg,#1B3A5C08,#7c3aed08);border-left:3px solid #7c3aed;border-radius:0 10px 10px 0;margin-bottom:10px}
.drill-banner-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.drill-banner-text{font-size:12px;color:#4c1d95;line-height:1.65;font-weight:600}
/* 청크 역할별 색상 (뱅크에서만) */
.ck-bank.role-s{border-color:#93c5fd;background:#eff6ff}
.ck-bank.role-v{border-color:#fca5a5;background:#fff5f5}
.ck-bank.role-oc{border-color:#86efac;background:#f0fdf4}
.ck-bank.role-mod{border-color:#fcd34d;background:#fffdf5}
/* 구역 레이블 */
.zone-lbl-drill{font-size:10px;font-weight:800;color:#7c3aed;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:5px}

/* 관리자 */
.admin-row{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;background:#fafafa}
.admin-meta{font-size:11px;color:#888;margin-bottom:6px}
.admin-sent{font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:10px;line-height:1.5}
.admin-ans-box{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:10px}
.admin-ans-lbl{font-size:10px;font-weight:700;margin-bottom:4px}
.admin-ans-val{font-size:13px;font-weight:600;line-height:1.5}
.admin-btn-row{display:flex;gap:8px}
.admin-btn-row .btn{flex:1;padding:10px;font-size:13px}
/* drag */
.ck[draggable]{cursor:grab}
.ck.dragging{opacity:.35;transform:scale(.95)}
.drop-indicator{width:3px;min-height:36px;border-radius:3px;background:#1B3A5C;flex-shrink:0;animation:blink .6s ease-in-out infinite alternate}
@keyframes blink{from{opacity:.4}to{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.answer-zone.drag-over{border-color:#1B3A5C;background:#eff6ff}
.bank-zone.drag-over{background:#f0f4ff}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;background:#1B3A5C;color:#fff;border-radius:9px;padding:9px 14px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:.88;white-space:nowrap;transform:translate(-50%,-50%);font-family:-apple-system,'Apple SD Gothic Neo',sans-serif}
/* utils */
.fb{display:flex;justify-content:space-between;align-items:center}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.em{font-size:40px;text-align:center;margin-bottom:8px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}
/* 출제 비율 버튼 (SF Voca 동일) */
.pgBtn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;border:2px solid #ddd;background:#fff;cursor:pointer;color:#333;transition:all .15s}
.pgBtn.on{border-color:#1B3A5C;background:#1B3A5C;color:#fff}
/* ── drill 모드 청크 상태 스타일 ── */
.ck-dimmed{opacity:.45;border-style:dashed!important}
.ck-locked{background:#e2e8f0!important;color:#94a3b8!important;cursor:default!important}
.ck-grouped{border:2px solid #3b82f6!important}
.ck-selected{border:2px solid #16a34a!important;background:#f0fdf4!important}
</style>

  {id:"mock_2021_03_21",title:"21년 3월 모의 21번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"Get past the 'I wish I hadn't done that!' reaction.",chunks:["Get past","the 'I wish I hadn't done that!' reaction"],labels:["V","O"],pattern:"명령문",concept:"명령문 + 인용 내포 명사구",explanation:"명령문: 주어 You 생략, Get past(V)로 시작. 'the reaction'이 O. reaction을 수식하는 인용구 'I wish I hadn't done that!'는 명사구에 동격처럼 내포. 핵심 뼈대: (You) get past(V) the reaction(O).",linkedGrammar:{tp:"TP01","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "[___] past the 'I wish I hadn't done that!' reaction.", "options": ["Get", "Getting"], "answer": "Get", "explanation": {"structure": "이 문장은 명령문입니다.", "rule": "명령문은 주어(You)가 생략되고 동사원형으로 시작합니다.", "connection": "문장 첫 자리는 동사 자리이므로 동사원형 Get이 맞습니다. Getting은 동명사 형태로 명령문 동사 자리에 올 수 없습니다."}}},
    {id:"q2",sentence:"Accept that it's happened now.",chunks:["Accept","that it's happened now"],labels:["V","O"],pattern:"명령문",concept:"명령문 + that절 목적어",explanation:"명령문: Accept(V)로 시작. 'that it's happened now'는 명사절로 목적어(O) 역할. that절 목적어를 취하는 동사 패턴: accept / admit / realize + that절.",linkedGrammar:{tp:"TP01","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "[___] that it's happened now.", "options": ["Accept", "Accepting"], "answer": "Accept", "explanation": {"structure": "이 문장은 명령문입니다.", "rule": "명령문은 주어(You)가 생략되고 동사원형으로 시작합니다.", "connection": "문장 첫 자리는 동사 자리이므로 동사원형 Accept가 맞습니다. Accepting은 동명사나 현재분사로 명령문 동사 자리에 올 수 없습니다."}}},
    {id:"q3",sentence:"The only value of 'I wish I hadn't done that!' is that you'll know better what to do next time.",chunks:["The only value of 'I wish I hadn't done that!'","is","that you'll know better what to do next time"],labels:["S","V","C"],pattern:"SVC",concept:"2형식 — that절 명사절 보어",explanation:"핵심 뼈대: The only value(S) is(V) that …(C). that절이 주격 보어 자리에 위치 — SVC 2형식. that절 내부에 간접의문문 'what to do next time'이 know의 목적어로 내포됨."},
    {id:"q4",sentence:"The learning pay-off is useful and significant.",chunks:["The learning pay-off","is","useful and significant"],labels:["S","V","C"],pattern:"SVC",concept:"2형식 기본 SVC",explanation:"가장 기본적인 2형식 뼈대. The learning pay-off(S) is(V) useful and significant(C). 형용사 두 개가 and로 병렬 연결되어 보어(C) 자리를 채움."},
    {id:"q5",sentence:"This 'if only I ...' agenda is virtual.",chunks:["This 'if only I ...' agenda","is","virtual"],labels:["S","V","C"],pattern:"SVC",concept:"2형식 기본 SVC",explanation:"핵심 뼈대: This agenda(S) is(V) virtual(C). 'if only I ...'는 agenda를 수식하는 삽입 인용구. virtual(형용사)이 주격 보어 자리. SVC 2형식."},
    {id:"q6",sentence:"Once you have worked that out, it is time to translate it from the past tense to the future tense.",chunks:["Once you have worked that out,","it","is","time","to translate it from the past tense to the future tense"],labels:["Adv.Cl","S","V","C","Inf"],pattern:"SVC",concept:"Once 부사절 + it is time to-V 구문",explanation:"핵심 뼈대: it(S) is(V) time(C). 'to translate it from the past tense to the future tense'는 time을 뒤에서 수식하는 to부정사구. 'Once you have worked that out'은 시간 부사절 — 문두에 오면 쉼표로 분리."}
  ]},
  {id:"mock_2021_03_23",title:"21년 3월 모의 23번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"When two people are involved in an honest and open conversation, there is a back and forth flow of information.",chunks:["When two people are involved in an honest and open conversation,","there is","a back and forth flow of information"],labels:["Adv.Cl","V","S"],pattern:"There be 구문",concept:"There be 구문 + when 부사절",explanation:"There is/are + S: 존재·등장을 나타내는 There be 구문. 진짜 주어는 'a back and forth flow of information'. 'When two people are involved …'는 조건/상황 부사절로 문두에서 쉼표로 분리."},
    {id:"q2",sentence:"Since each one is drawing on their past personal experiences, the pace of the exchange is as fast as memory.",chunks:["Since each one is drawing on their past personal experiences,","the pace of the exchange","is","as fast as memory"],labels:["Adv.Cl","S","V","C"],pattern:"SVC",concept:"Since 부사절 + as~as 비교 보어",explanation:"핵심 뼈대: the pace(S) is(V) as fast as memory(C). 'as fast as memory'는 원급 비교 형용사구로 보어 자리. 'Since each one is drawing on …'는 이유 부사절 — 문두에 오면 쉼표 필수."},
    {id:"q3",sentence:"When one person lies, their responses will come more slowly because the brain needs more time to process the details of a new invention than to recall stored facts.",chunks:["When one person lies,","their responses","will come","more slowly","because the brain needs more time to process the details than to recall stored facts"],labels:["Adv.Cl","S","V","Mod","Adv.Cl"],pattern:"SV + Mod",concept:"부사절 중첩 + 부사 수식어",explanation:"핵심 뼈대: their responses(S) will come(V). come은 완전자동사 — SV. 'more slowly'는 부사 수식어. When절(시간)과 because절(이유) 두 부사절이 문장을 감쌈."},
    {id:"q4",sentence:"The brain needs more time to process the details of a new invention than to recall stored facts.",chunks:["The brain","needs","more time","to process the details of a new invention","than to recall stored facts"],labels:["S","V","O","Inf","Comp"],pattern:"SVO",concept:"more ~ than 비교 + to부정사",explanation:"핵심 뼈대: The brain(S) needs(V) more time(O). 'to process the details …'와 'than to recall stored facts'는 more ~ than 비교 구조로 연결된 두 to부정사구. time을 수식하며 서로 대조."},
    {id:"q5",sentence:"You will notice the time lag when you are having a conversation with someone who is making things up as they go.",chunks:["You","will notice","the time lag","when you are having a conversation with someone who is making things up as they go"],labels:["S","V","O","Adv.Cl"],pattern:"SVO",concept:"SVO + when 부사절(관계절 중첩)",explanation:"핵심 뼈대: You(S) will notice(V) the time lag(O). when절 안에 관계절 'who is making things up as they go'가 중첩되어 someone을 수식. 'make things up'은 '즉흥으로 꾸며내다' 의미의 구동사."},
    {id:"q6",sentence:"Don't forget that the other person may be reading your body language as well.",chunks:["Don't forget","that the other person may be reading your body language as well"],labels:["V","O"],pattern:"명령문",concept:"부정 명령문 + that절 목적어",explanation:"부정 명령문: Don't + 동사원형(forget). 'that the other person may be reading …'는 명사절로 목적어(O) 자리. may be reading은 현재진행형의 추측(may + be + V-ing). 'as well'은 '~도'의 부사."}
  ]},
  {id:"mock_2021_03_31",title:"21년 3월 모의 31번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"One of the most important aspects of providing good care is making sure that an animal's needs are being met consistently and predictably.",chunks:["One of the most important aspects of providing good care","is","making sure","that an animal's needs are being met consistently and predictably"],labels:["S","V","C","O(that절)"],pattern:"SVC",concept:"동명사 보어 + that절 목적어",explanation:"핵심 뼈대: One(S) is(V) making sure(C). 'of the most important aspects …'는 One을 수식하는 전치사구. 'making sure'는 동명사구로 보어. 'that절'은 make sure의 목적절. 'are being met'은 수동태 진행형(be being p.p.).",linkedGrammar:{tp:"TP22","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "One of the most important aspects of providing good care [___] making sure that an animal's needs are being met consistently and predictably.", "options": ["is", "are"], "answer": "is", "explanation": {"structure": "이 문장의 진짜 주어는 One입니다.", "rule": "'One of the + 복수명사' 구조에서 동사는 One에 맞춥니다. of 뒤의 명사(aspects)는 수식어이므로 동사 결정에 영향을 주지 않습니다.", "connection": "주어 One은 단수이므로 is가 맞습니다. aspects에 맞춰 are를 쓰면 틀립니다."}}},
    {id:"q2",sentence:"Like humans, animals need a sense of control.",chunks:["Like humans,","animals","need","a sense of control"],labels:["Mod","S","V","O"],pattern:"SVO",concept:"SVO + 비교 전치사구 수식어",explanation:"핵심 뼈대: animals(S) need(V) a sense of control(O). 'Like humans'는 비교를 나타내는 전치사구 수식어 — 문두에 오면 쉼표로 본 절과 분리. 'a sense of control': sense(핵심 명사) + of control(수식 전치사구)."},
    {id:"q3",sentence:"An animal who may get enough food but doesn't know when the food will appear and can see no consistent schedule may experience distress.",chunks:["An animal","who may get enough food but doesn't know when the food will appear and can see no consistent schedule","may experience","distress"],labels:["S","Rel.Cl","V","O"],pattern:"SVO",concept:"관계절 수식 주어 + 간접의문문",explanation:"핵심 뼈대: An animal(S) may experience(V) distress(O). 'who may get … and can see …'는 animal을 수식하는 관계절 — 내부에 두 동사구(get/see)가 but으로 대조. 'when the food will appear'는 know의 목적어인 간접의문문."},
    {id:"q4",sentence:"We can provide a sense of control by ensuring that our animal's environment is predictable.",chunks:["We","can provide","a sense of control","by ensuring that our animal's environment is predictable"],labels:["S","V","O","Mod"],pattern:"SVO + Mod",concept:"SVO + by V-ing 수단 수식어",explanation:"핵심 뼈대: We(S) can provide(V) a sense of control(O). 'by ensuring …'는 수단을 나타내는 전치사구(by + 동명사). 'that our animal's environment is predictable'은 ensure의 목적절(that절).",linkedGrammar:{tp:"TP05","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "We can provide a sense of control by [___] that our animal's environment is predictable.", "options": ["ensuring", "to ensure"], "answer": "ensuring", "explanation": {"structure": "이 문장의 핵심은 We can provide입니다.", "rule": "by는 전치사입니다. 전치사 뒤에는 동명사(v-ing)가 옵니다.", "connection": "전치사 by 뒤이므로 동명사 ensuring이 맞습니다. to ensure는 전치사 바로 뒤에 올 수 없습니다."}}},
    {id:"q5",sentence:"There is always water available and always in the same place.",chunks:["There is","always","water","available and always in the same place"],labels:["V","Mod","S","C"],pattern:"There be 구문",concept:"There be 구문 + 형용사 보어",explanation:"There is + S(water). 'available and always in the same place'는 water를 보충 설명하는 형용사구(보어적 수식). 'always'는 빈도 부사. There be 구문에서 진짜 주어는 be 뒤에 위치."},
    {id:"q6",sentence:"There will always be a time and place to eliminate, without having to hold things in to the point of discomfort.",chunks:["There will always be","a time and place","to eliminate","without having to hold things in to the point of discomfort"],labels:["V","S","Inf","Mod"],pattern:"There be 구문",concept:"There be 구문 + to부정사 수식 + without V-ing",explanation:"There will be + S(a time and place). 'to eliminate'는 time and place를 수식하는 to부정사. 'without having to hold …'는 부대 상황 전치사구(without + 동명사). 'hold things in'은 구동사."},
    {id:"q7",sentence:"Human companions can display consistent emotional support, rather than providing love one moment and withholding love the next.",chunks:["Human companions","can display","consistent emotional support","rather than providing love one moment and withholding love the next"],labels:["S","V","O","Mod"],pattern:"SVO + Mod",concept:"SVO + rather than V-ing 대조 수식어",explanation:"핵심 뼈대: Human companions(S) can display(V) consistent emotional support(O). 'rather than providing … and withholding …'는 대조를 나타내는 전치사구 수식어. providing과 withholding이 and로 병렬. 'one moment … the next'는 대조적 시간 표현."},
    {id:"q8",sentence:"When animals know what to expect, they can feel more confident and calm.",chunks:["When animals know what to expect,","they","can feel","more confident and calm"],labels:["Adv.Cl","S","V","C"],pattern:"SVC",concept:"2형식 feel + 형용사 보어 + when 부사절",explanation:"핵심 뼈대: they(S) can feel(V) more confident and calm(C). feel은 2형식 동사 — 형용사 보어를 취함. 'more confident and calm'에서 두 형용사가 and로 병렬. 'what to expect'는 의문사 + to부정사 명사구로 know의 목적어."}
  ]},
  {id:"mock_2021_03_30",title:"21년 3월 모의 30번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"When the price of something fundamental drops greatly, the whole world can change.",chunks:["When the price of something fundamental drops greatly,","the whole world","can change"],labels:["Adv.Cl","S","V"],pattern:"SV",concept:"완전자동사 SV + when 부사절",explanation:"핵심 뼈대: the whole world(S) can change(V). change는 여기서 완전자동사 — SV로 완결. 'When the price … drops greatly'는 조건·상황 부사절. 'something fundamental'에서 형용사 fundamental이 부정대명사 something을 뒤에서 수식."},
    {id:"q2",sentence:"Chances are you are reading this sentence under some kind of artificial light.",chunks:["Chances are","you","are reading","this sentence","under some kind of artificial light"],labels:["관용표현","S","V","O","Mod"],pattern:"SVO + Mod",concept:"'Chances are (that)' 관용 표현",explanation:"'Chances are (that) …'는 '아마도 ~일 것이다'의 관용 표현 — that 생략 가능. 뒤에 오는 절: you(S) are reading(V) this sentence(O). 'under some kind of artificial light'는 상황 전치사구 수식어."},
    {id:"q3",sentence:"Light is so cheap that you use it without thinking.",chunks:["Light","is","so cheap","that you use it without thinking"],labels:["S","V","C","Adv.Cl"],pattern:"SVC",concept:"so ~ that 결과절",explanation:"핵심 뼈대: Light(S) is(V) so cheap(C). 'so + 형용사 + that절'은 정도·결과를 나타내는 구조: '너무 ~해서 …하다'. that절은 결과 부사절. 'without thinking'은 전치사구(without + 동명사)."},
    {id:"q4",sentence:"But in the early 1800s, it would have cost you four hundred times what you are paying now for the same amount of light.",chunks:["But in the early 1800s,","it","would have cost","you","four hundred times what you are paying now for the same amount of light"],labels:["Mod","S","V","IO","DO"],pattern:"SVOO",concept:"4형식 가정법과거완료 + what절 목적어",explanation:"4형식: cost + IO(you) + DO(four hundred times …). 'would have cost'는 가정법과거완료 조동사구. 'what you are paying now …'는 관계사 what이 이끄는 명사절로 DO 자리. 'four hundred times'는 배수 표현.",linkedGrammar:{tp:"TP32","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "But in the early 1800s, it [___] you four hundred times what you are paying now for the same amount of light.", "options": ["would have cost", "would cost"], "answer": "would have cost", "explanation": {"structure": "이 문장은 과거 사실에 대한 가정법 과거완료입니다.", "rule": "과거의 반대 상황을 가정할 때 주절에는 'would have + p.p.'를 씁니다. 현재/미래 반대 상황에는 'would + 동사원형'을 씁니다.", "connection": "'1800년대에 그랬을 것이다'는 과거 시점의 가정이므로 would have cost가 맞습니다. would cost는 현재/미래 가정에 씁니다."}}},
    {id:"q5",sentence:"The decrease in the price of light lit up the world.",chunks:["The decrease in the price of light","lit up","the world"],labels:["S","V","O"],pattern:"SVO",concept:"전치사구 수식 주어 + 구동사",explanation:"핵심 뼈대: The decrease(S) lit up(V) the world(O). 'in the price of light'는 전치사구로 decrease를 수식. 'lit up'은 light up(밝히다)의 과거형 구동사(phrasal verb)."},
    {id:"q6",sentence:"Not only did it turn night into day, but it allowed us to live and work in big buildings that natural light could not enter.",chunks:["Not only did it turn night into day,","but it","allowed","us","to live and work in big buildings that natural light could not enter"],labels:["도치절","S","V","O","OC(Inf)"],pattern:"SVOC",concept:"Not only ~ but 상관접속사 + 부정어 도치 + 5형식",explanation:"'Not only'가 절 앞에 오면 조동사 도치 발생: Not only did it turn … 5형식: allow + O(us) + to-V(OC). to live and work는 두 동사가 and로 병렬. 관계절 'that natural light could not enter'는 buildings 수식.",linkedGrammar:{"type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Not only did it turn night into day, but it allowed us to live and [___] in big buildings that natural light could not enter.", "options": ["work", "to work"], "answer": "work", "explanation": {"structure": "이 문장의 핵심은 it allowed us to live and [___]입니다.", "rule": "등위접속사 and로 연결된 병렬 구조에서는 앞뒤 형태를 일치시킵니다. to live의 live와 and로 연결된 자리이므로 동사원형이 와야 합니다.", "connection": "to live and [work] — to 하나가 두 동사원형(live / work)을 이끄는 병렬 구조이므로 동사원형 work가 맞습니다. to work는 to가 중복됩니다."}, "tp": "TP02"}},
    {id:"q7",sentence:"Nearly nothing we have today would be possible if the cost of artificial light had not dropped to almost nothing.",chunks:["Nearly nothing we have today","would be","possible","if the cost of artificial light had not dropped to almost nothing"],labels:["S","V","C","Adv.Cl"],pattern:"SVC",concept:"가정법과거완료 + 관계절 수식 주어",explanation:"핵심 뼈대: Nearly nothing(S) would be(V) possible(C). 'we have today'는 nothing을 수식하는 관계절. 'if the cost … had not dropped'는 가정법과거완료 — 과거 사실의 반대를 가정. SVC 2형식에 가정법이 적용된 구조.",linkedGrammar:{tp:"TP32","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Nearly nothing we have today would be possible if the cost of artificial light [___] to almost nothing.", "options": ["had not dropped", "didn't drop"], "answer": "had not dropped", "explanation": {"structure": "이 문장은 과거 사실의 반대를 가정하는 가정법 과거완료입니다.", "rule": "주절에 'would + 동사원형'이 있고 과거의 사실을 반대로 가정할 때, if절에는 'had + p.p.(과거완료)'를 씁니다.", "connection": "실제로 과거에 가격이 떨어졌으므로, 그 반대 상황을 가정하는 had not dropped가 맞습니다. didn't drop은 가정법 과거(현재 사실의 반대) if절에 씁니다."}}}
  ]},
  {id:"mock_2021_03_22",title:"21년 3월 모의 22번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"If you care deeply about something, you may place greater value on your ability to succeed in that area of concern.",chunks:["If you care deeply about something,","you","may place","greater value","on your ability to succeed in that area of concern"],labels:["Adv.Cl","S","V","O","Mod"],pattern:"SVO + Mod",concept:"SVO + 전치사구 수식어 + 조건 부사절",explanation:"핵심 뼈대: you(S) may place(V) greater value(O). 'on your ability to succeed …'는 전치사구 수식어. 'to succeed in that area'는 ability를 수식하는 to부정사. If절은 조건 부사절."},
    {id:"q2",sentence:"The internal pressure you place on yourself to achieve is normal and useful.",chunks:["The internal pressure","you place on yourself to achieve","is","normal and useful"],labels:["S","Rel.Cl","V","C"],pattern:"SVC",concept:"관계절 수식 주어 + 2형식",explanation:"핵심 뼈대: The internal pressure(S) is(V) normal and useful(C). 'you place on yourself to achieve'는 pressure를 수식하는 관계절(목적격 관계사 생략). SVC 2형식.",linkedGrammar:{"type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "The internal pressure you place on yourself to achieve [___] normal and useful.", "options": ["is", "to be"], "answer": "is", "explanation": {"structure": "이 문장의 진짜 주어는 The internal pressure입니다.", "rule": "'The pressure + 관계절(you place on yourself)' 구조에서 관계절은 수식어입니다. 동사는 The pressure에 맞춥니다.", "connection": "주어 The pressure는 단수이므로 is가 맞습니다. to be는 동사 자리에 올 수 없습니다."}, "tp": "TP22"}},
    {id:"q3",sentence:"When you doubt your ability to succeed in areas that are important to you, your self-worth suffers.",chunks:["When you doubt your ability to succeed in areas that are important to you,","your self-worth","suffers"],labels:["Adv.Cl","S","V"],pattern:"SV",concept:"SV + when 부사절(관계절 중첩)",explanation:"핵심 뼈대: your self-worth(S) suffers(V). suffer는 완전자동사 — SV로 완결. When절 안에 관계절(that are important to you)이 중첩. 'to succeed in areas'는 ability 수식 to부정사."},
    {id:"q4",sentence:"Situations are uniquely stressful for each of us based on whether or not they activate our doubt.",chunks:["Situations","are","uniquely stressful","for each of us","based on whether or not they activate our doubt"],labels:["S","V","C","Mod","Mod"],pattern:"SVC + Mod",concept:"2형식 SVC + 전치사구 수식어 복수",explanation:"핵심 뼈대: Situations(S) are(V) uniquely stressful(C). 'for each of us'는 범위 수식어. 'based on whether or not …'는 분사구문 수식어. whether or not절은 간접의문문."},
    {id:"q5",sentence:"It is not the pressure to perform that creates your stress.",chunks:["It","is","not the pressure to perform","that creates your stress"],labels:["가S","V","실S","Rel.Cl"],pattern:"It~that 강조 구문",concept:"It~that 강조 구문",explanation:"It is [강조 대상] that … 강조 구문. 강조된 주어: not the pressure to perform. 'that creates your stress'는 강조 구문의 that절. 'It'은 형식주어(가S)이고 실제 주어(실S)는 the pressure to perform.",linkedGrammar:{tp:"TP10","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "It is not the pressure to perform [___] creates your stress.", "options": ["that", "what"], "answer": "that", "explanation": {"structure": "이 문장은 'It is ~ that' 강조 구문입니다.", "rule": "강조 구문 'It is A that B'에서 that은 접속사 역할을 하며 which로 바꿀 수 없습니다.", "connection": "'It is the pressure that ~' 강조 구문이므로 that이 맞습니다. what은 선행사를 포함하는 관계사로, 강조 구문의 접속사 자리에 올 수 없습니다."}}},
    {id:"q6",sentence:"Rather, it is the self-doubt that bothers you.",chunks:["Rather,","it","is","the self-doubt","that bothers you"],labels:["Mod","가S","V","실S","Rel.Cl"],pattern:"It~that 강조 구문",concept:"It~that 강조 구문 + 역접 부사",explanation:"앞 문장과 대비되는 It~that 강조 구문. 강조 대상: the self-doubt. 'Rather'는 앞 절(pressure → stress)을 반박하는 역접 부사. It(가S) is(V) the self-doubt(실S)."},
    {id:"q7",sentence:"Doubt causes you to see positive, neutral, and even genuinely negative experiences more negatively and as a reflection of your own shortcomings.",chunks:["Doubt","causes","you","to see positive, neutral, and even genuinely negative experiences","more negatively and as a reflection of your own shortcomings"],labels:["S","V","O","OC(Inf)","Mod"],pattern:"SVOC",concept:"cause + O + to-V (5형식)",explanation:"5형식: cause + O + to-V. Doubt(S) causes(V) you(O) to see experiences(OC). 'more negatively and as a reflection …'는 see의 방식/결과 수식어. 세 형용사(positive, neutral, negative)가 experiences를 병렬 수식."},
    {id:"q8",sentence:"When you see situations and your strengths more objectively, you are less likely to have doubt as the source of your distress.",chunks:["When you see situations and your strengths more objectively,","you","are","less likely to have doubt as the source of your distress"],labels:["Adv.Cl","S","V","C"],pattern:"SVC",concept:"2형식 SVC + when 부사절",explanation:"핵심 뼈대: you(S) are(V) less likely to have doubt …(C). 'less likely to-V'는 형용사구로 보어 자리. When절은 시간·조건 부사절. 'as the source of your distress'는 doubt의 역할을 설명하는 전치사구."}
  ]},
  {id:"mock_2021_03_38",title:"21년 3월 모의 38번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"It is so easy to overestimate the importance of one defining moment and underestimate the value of making small improvements on a daily basis.",chunks:["It","is","so easy","to overestimate the importance of one defining moment and underestimate the value of making small improvements on a daily basis"],labels:["가S","V","C","진S"],pattern:"가주어 it ~ 진주어 to-V",concept:"가주어 it + 진주어 to부정사",explanation:"It(가S) is(V) so easy(C) — 진짜 주어는 to부정사구. 'to overestimate … and underestimate …' 두 동사가 and로 병렬 연결되어 하나의 진주어를 형성. 'so easy'의 so는 정도 강조 부사."},
    {id:"q2",sentence:"Too often, we convince ourselves that massive success requires massive action.",chunks:["Too often,","we","convince","ourselves","that massive success requires massive action"],labels:["Mod","S","V","O","OC(that절)"],pattern:"SVOC",concept:"convince + O + that절 (5형식)",explanation:"convince + O + that절 구조. we(S) convince(V) ourselves(O) that절(OC). 'Too often'은 빈도 부사어 — 문두에서 쉼표로 분리. 'massive success requires massive action'은 that절의 SVO 뼈대."},
    {id:"q3",sentence:"Whether it is losing weight, winning a championship, or achieving any other goal, we put pressure on ourselves to make some earthshaking improvement.",chunks:["Whether it is losing weight, winning a championship, or achieving any other goal,","we","put pressure on ourselves","to make some earthshaking improvement"],labels:["Adv.Cl","S","V","Inf"],pattern:"SVO + Inf",concept:"Whether 양보 부사절 + put pressure on + to부정사",explanation:"핵심 뼈대: we(S) put pressure on ourselves(V+O). 'to make some earthshaking improvement'는 목적·결과 to부정사구 수식어. Whether절은 양보 부사절 — 어떤 경우든 관계없이. losing/winning/achieving 세 동명사가 병렬."},
    {id:"q4",sentence:"Improving by 1 percent isn't particularly notable, but it can be far more meaningful in the long run.",chunks:["Improving by 1 percent","isn't","particularly notable","but it can be far more meaningful in the long run"],labels:["S","V","C","등위절"],pattern:"SVC",concept:"동명사 주어 + SVC + but 등위절",explanation:"동명사구 'Improving by 1 percent'(S) isn't(V) particularly notable(C). but 이하는 대조 등위절: it(S) can be(V) far more meaningful(C). 'far more meaningful'에서 far는 비교급 강조 부사."},
    {id:"q5",sentence:"The difference this tiny improvement can make over time is surprising.",chunks:["The difference","this tiny improvement can make over time","is","surprising"],labels:["S","Rel.Cl","V","C"],pattern:"SVC",concept:"관계절 수식 주어 + 2형식",explanation:"핵심 뼈대: The difference(S) is(V) surprising(C). 'this tiny improvement can make over time'은 difference를 수식하는 관계절(목적격 관계사 that/which 생략). SVC 2형식.",linkedGrammar:{"type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "The difference this tiny improvement can make over time [___] surprising.", "options": ["is", "to be"], "answer": "is", "explanation": {"structure": "이 문장의 진짜 주어는 The difference입니다.", "rule": "'The difference + 관계절(this tiny improvement can make)' 구조에서 관계절은 수식어입니다. 동사는 The difference에 맞춥니다.", "connection": "주어 The difference는 단수이므로 is가 맞습니다. to be는 동사 자리에 올 수 없습니다."}, "tp": "TP22"}},
    {id:"q6",sentence:"If you can get 1 percent better each day for one year, you'll end up thirty-seven times better by the time you're done.",chunks:["If you can get 1 percent better each day for one year,","you'll end up","thirty-seven times better","by the time you're done"],labels:["Adv.Cl","V","C","Adv.Cl"],pattern:"SVC",concept:"가정 부사절 + end up + 형용사 보어 + by the time절",explanation:"핵심 뼈대: you(S) will end up(V) thirty-seven times better(C). end up + 형용사: '결국 ~한 상태가 되다'. '37 times better'는 배수 비교 표현. 'by the time you're done'은 시간 부사절."},
    {id:"q7",sentence:"Conversely, if you get 1 percent worse each day for one year, you'll decline nearly down to zero.",chunks:["Conversely,","if you get 1 percent worse each day for one year,","you'll decline","nearly down to zero"],labels:["Mod","Adv.Cl","V","Mod"],pattern:"SV + Mod",concept:"완전자동사 decline + 부사구 + 조건 부사절",explanation:"핵심 뼈대: you(S) will decline(V). decline은 완전자동사 — SV로 완결. 'nearly down to zero'는 방향·정도 부사구 수식어. 'Conversely'는 앞 문장(1% 향상)과 대비되는 접속 부사."},
    {id:"q8",sentence:"What starts as a small win or a minor failure adds up to something much more.",chunks:["What starts as a small win or a minor failure","adds up to","something much more"],labels:["S","V","O"],pattern:"SVO",concept:"관계사 What절 주어 + 구동사",explanation:"'What starts as …'는 관계사 what이 이끄는 명사절 — 문장 전체의 주어(S). 'adds up to'는 '합쳐져 ~이 되다'의 구동사(phrasal verb). 'something much more': much는 형용사 more를 강조.",linkedGrammar:{tp:"TP10","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "[___] starts as a small win or a minor failure adds up to something much more.", "options": ["What", "That"], "answer": "What", "explanation": {"structure": "빈칸 뒤 starts의 주어가 빠져 있고, 이 절 전체가 문장의 주어입니다.", "rule": "선행사 없이 명사절 주어를 이끌고 절 안에서 주어 역할을 할 때는 what을 씁니다.", "connection": "starts의 주어 역할을 하면서 전체 명사절 주어를 만드므로 What이 맞습니다. That은 절 안에서 주어 역할을 하지 않습니다."}}}
  ]},
  {id:"mock_2021_03_39",title:"21년 3월 모의 39번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"The continued survival of the human race can be explained by our ability to adapt to our environment.",chunks:["The continued survival of the human race","can be explained","by our ability to adapt to our environment"],labels:["S","V","Mod"],pattern:"수동태 SV",concept:"수동태 + by구 + to부정사 수식",explanation:"핵심 뼈대: The continued survival(S) can be explained(V) — 수동태(can be p.p.). 'by our ability'는 수동태의 행위자·수단 전치사구. 'to adapt to our environment'는 ability를 수식하는 to부정사.",linkedGrammar:{tp:"TP27","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "The continued survival of the human race can [___] by our ability to adapt to our environment.", "options": ["be explained", "explain"], "answer": "be explained", "explanation": {"structure": "이 문장의 주어는 The continued survival입니다.", "rule": "주어와 동사의 관계를 봐야 합니다. 생존(survival)은 '설명되는' 것이지 스스로 '설명하는' 것이 아닙니다. 수동 관계에는 be + p.p.를 씁니다.", "connection": "by our ability라는 행위자 표현도 수동태를 지지합니다. 따라서 be explained(수동)가 맞습니다."}}},
    {id:"q2",sentence:"While we may have lost some of our ancient ancestors' survival skills, we have learned new skills as they have become necessary.",chunks:["While we may have lost some of our ancient ancestors' survival skills,","we","have learned","new skills","as they have become necessary"],labels:["Adv.Cl","S","V","O","Adv.Cl"],pattern:"SVO",concept:"While 양보절 + SVO + as 부사절",explanation:"핵심 뼈대: we(S) have learned(V) new skills(O). While절은 양보 부사절(~하는 반면). 'as they have become necessary'는 이유·시간 부사절. 'may have lost'는 과거 추측 완료형."},
    {id:"q3",sentence:"Today, the gap between the skills we once had and the skills we now have grows ever wider as we rely more heavily on modern technology.",chunks:["Today,","the gap between the skills we once had and the skills we now have","grows","ever wider","as we rely more heavily on modern technology"],labels:["Mod","S","V","C","Adv.Cl"],pattern:"SVC",concept:"2형식 grow + 형용사 보어 + as 부사절",explanation:"핵심 뼈대: the gap(S) grows(V) ever wider(C). grow는 2형식 동사 — 형용사 보어를 취함. 'ever wider'에서 ever는 비교급 강조 부사. 주어 the gap은 두 관계절(we once had / we now have)로 수식된 복합 명사구."},
    {id:"q4",sentence:"Therefore, when you head off into the wilderness, it is important to fully prepare for the environment.",chunks:["Therefore,","when you head off into the wilderness,","it","is","important","to fully prepare for the environment"],labels:["Mod","Adv.Cl","가S","V","C","진S"],pattern:"가주어 it ~ 진주어 to-V",concept:"가주어 it + 진주어 to부정사 + when 부사절",explanation:"It(가S) is(V) important(C) — 진주어는 'to fully prepare for the environment'. 'when you head off into the wilderness'는 시간 부사절. 'head off into'는 구동사(~을 향해 떠나다)."},
    {id:"q5",sentence:"Before a trip, research how the native inhabitants dress, work, and eat.",chunks:["Before a trip,","research","how the native inhabitants dress, work, and eat"],labels:["Mod","V","O"],pattern:"명령문",concept:"명령문 + how절 간접의문문 목적어",explanation:"명령문: research(V)로 시작(주어 You 생략). 'how the native inhabitants dress, work, and eat'는 간접의문문으로 목적어(O) 자리. 세 동사(dress / work / eat)가 and로 병렬."},
    {id:"q6",sentence:"How they have adapted to their way of life will help you to understand the environment and allow you to select the best gear and learn the correct skills.",chunks:["How they have adapted to their way of life","will help","you","to understand the environment","and allow you to select the best gear and learn the correct skills"],labels:["S","V","O","OC(Inf)","등위절"],pattern:"SVOC",concept:"간접의문문 주어 + help/allow + O + to-V (5형식 병렬)",explanation:"'How they have adapted …'는 간접의문문이 문장 주어(S)로 기능. 5형식: help + you(O) + to understand(OC). and 이하 'allow you to select … and learn …'도 같은 5형식이 등위 연결. 목적격 보어 자리에 to부정사 두 개 병렬."},
    {id:"q7",sentence:"This is crucial because most survival situations arise as a result of a series of events that could have been avoided.",chunks:["This","is","crucial","because most survival situations arise as a result of a series of events that could have been avoided"],labels:["S","V","C","Adv.Cl"],pattern:"SVC",concept:"2형식 SVC + because 부사절(관계절 중첩)",explanation:"핵심 뼈대: This(S) is(V) crucial(C). because절은 이유 부사절. 절 내부 뼈대: most survival situations(S) arise(V). 관계절 'that could have been avoided'가 events를 수식 — 수동태 가정법과거완료(could have been p.p.).",linkedGrammar:{tp:"TP03","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "...most survival situations arise as a result of a series of events that could have been [___].", "options": ["avoided", "avoiding"], "answer": "avoided", "explanation": {"structure": "events는 선행사이고, 빈칸은 could have been 뒤에 오는 과거분사 자리입니다.", "rule": "사건(events)은 '피해지는' 것이므로 수동 관계입니다. 'could have been + p.p.'는 수동태 완료형입니다.", "connection": "events는 avoid의 대상이므로 과거분사 avoided가 맞습니다. avoiding은 능동 관계에 씁니다."}}}
  ]},
  {id:"mock_2021_03_32",title:"21년 3월 모의 32번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"When a child is upset, the easiest and quickest way to calm them down is to give them food.",chunks:["When a child is upset,","the easiest and quickest way to calm them down","is","to give them food"],labels:["Adv.Cl","S","V","C"],pattern:"SVC",concept:"2형식 SVC + to부정사 보어 + when 부사절",explanation:"핵심 뼈대: the way(S) is(V) to give them food(C). to부정사구가 주격 보어 자리. 'the easiest and quickest way to calm them down'에서 to calm은 way를 수식하는 to부정사. When절은 조건·상황 부사절."},
    {id:"q2",sentence:"This acts as a distraction from the feelings they are having, gives them something to do with their hands and mouth, and shifts their attention from whatever was upsetting them.",chunks:["This","acts as a distraction from the feelings they are having,","gives them something to do with their hands and mouth,","and shifts their attention from whatever was upsetting them"],labels:["S","V1","V2","V3"],pattern:"SV (동사 3개 병렬)",concept:"주어 하나에 동사구 3개 병렬 연결",explanation:"This(S)가 주어, 세 동사구가 콤마+and로 병렬: acts as(V1) / gives(V2) / shifts(V3). 관계절 'they are having'이 feelings 수식. 'whatever was upsetting them'은 명사절로 from의 목적어."},
    {id:"q3",sentence:"If the food chosen is also seen as a treat such as sweets or a biscuit, then the child will feel 'treated' and happier.",chunks:["If the food chosen is also seen as a treat such as sweets or a biscuit,","the child","will feel","'treated' and happier"],labels:["Adv.Cl","S","V","C"],pattern:"SVC",concept:"2형식 feel + 형용사 보어 + 조건절(수동태)",explanation:"핵심 뼈대: the child(S) will feel(V) 'treated' and happier(C). feel은 2형식 동사. 두 형용사가 and로 병렬. If절 안 'is seen as'는 수동태. 'the food chosen'에서 chosen은 food를 수식하는 과거분사.",linkedGrammar:{tp:"TP03","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "If the food [___] is also seen as a treat such as sweets or a biscuit, then the child will feel 'treated' and happier.", "options": ["chosen", "choosing"], "answer": "chosen", "explanation": {"structure": "the food는 이 절의 주어이고, 빈칸은 food를 수식하는 분사 자리입니다.", "rule": "명사와 분사의 관계를 봐야 합니다. 음식(food)은 '선택되는' 것이므로 수동 관계입니다. 수동 관계에는 과거분사(p.p.)를 씁니다.", "connection": "food는 choose의 대상이므로 과거분사 chosen이 맞습니다. choosing은 food가 스스로 선택하는 능동 관계에 씁니다."}}},
    {id:"q4",sentence:"In the shorter term, using food like this is effective.",chunks:["In the shorter term,","using food like this","is","effective"],labels:["Mod","S","V","C"],pattern:"SVC",concept:"동명사 주어 + 2형식 SVC",explanation:"동명사구 'using food like this'(S) is(V) effective(C). 동명사 주어는 단수 취급 → is. 'In the shorter term'은 시간 범위 수식어로 문두에서 쉼표로 분리.",linkedGrammar:{tp:"TP26","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "In the shorter term, using food like this [___] effective.", "options": ["is", "are"], "answer": "is", "explanation": {"structure": "이 문장의 주어는 동명사구 'using food like this'입니다.", "rule": "동명사구가 주어일 때 단수 취급합니다.", "connection": "동명사구 주어는 단수이므로 is가 맞습니다."}}},
    {id:"q5",sentence:"But in the longer term it can be harmful as we quickly learn that food is a good way to manage emotions.",chunks:["But in the longer term,","it","can be","harmful","as we quickly learn that food is a good way to manage emotions"],labels:["Mod","S","V","C","Adv.Cl"],pattern:"SVC",concept:"2형식 SVC + as 이유절",explanation:"it(S) can be(V) harmful(C). 여기서 it은 앞 문장의 '음식으로 감정 관리하기'를 가리킴. 'as we quickly learn …'는 이유 부사절. that절은 learn의 목적절 — 'food is a good way to manage emotions'."},
    {id:"q6",sentence:"Whenever we feel annoyed, anxious, or even just bored, we turn to food to make ourselves feel better.",chunks:["Whenever we feel annoyed, anxious, or even just bored,","we","turn to food","to make ourselves feel better"],labels:["Adv.Cl","S","V","Inf"],pattern:"SV + Inf",concept:"Whenever 복합관계 부사절 + to부정사 목적",explanation:"핵심 뼈대: we(S) turn to food(V). 'to make ourselves feel better'는 목적 to부정사. make + ourselves(O) + feel better(OC) — 5형식. Whenever절은 '~할 때마다' 복합관계부사절. 세 형용사(annoyed/anxious/bored)가 feel의 보어로 병렬."}
  ]},
  {id:"mock_2021_03_33",title:"21년 3월 모의 33번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"Scientists believe that the frogs' ancestors were water-dwelling, fishlike animals.",chunks:["Scientists","believe","that the frogs' ancestors were water-dwelling, fishlike animals"],labels:["S","V","O"],pattern:"SVO",concept:"SVO — that절 목적어",explanation:"핵심 뼈대: Scientists(S) believe(V) that절(O). that절 내부: the frogs' ancestors(S) were(V) water-dwelling, fishlike animals(C) — SVC 2형식. believe는 that절을 목적어로 취하는 대표 동사."},
    {id:"q2",sentence:"The first frogs and their relatives gained the ability to come out on land and enjoy the opportunities for food and shelter there.",chunks:["The first frogs and their relatives","gained","the ability","to come out on land and enjoy the opportunities for food and shelter there"],labels:["S","V","O","Inf"],pattern:"SVO",concept:"SVO + to부정사 수식(ability)",explanation:"핵심 뼈대: The first frogs and their relatives(S) gained(V) the ability(O). 'to come out … and enjoy …'는 ability를 수식하는 to부정사구 — 두 동사(come out / enjoy)가 and로 병렬."},
    {id:"q3",sentence:"But for this kind of 'breathing' to work properly, the frog's skin must stay moist.",chunks:["But for this kind of 'breathing' to work properly,","the frog's skin","must stay","moist"],labels:["Mod","S","V","C"],pattern:"SVC",concept:"2형식 stay + 형용사 보어 + for ~ to부정사 부사구",explanation:"핵심 뼈대: the frog's skin(S) must stay(V) moist(C). stay는 2형식 동사 — 형용사 보어를 취함. 'for this kind of breathing to work properly'는 조건·전제를 나타내는 for + 명사 + to-V 구조.",linkedGrammar:{tp:"TP12","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "...the frog's skin must stay [___].", "options": ["moist", "moistly"], "answer": "moist", "explanation": {"structure": "이 문장의 핵심은 the frog's skin must stay입니다.", "rule": "stay는 2형식 동사로 뒤에 주격보어(형용사)가 옵니다. '~한 상태를 유지하다'의 의미입니다.", "connection": "stay 뒤 보어 자리이므로 형용사 moist가 맞습니다. moistly는 부사 형태로 보어 자리에 올 수 없습니다."}}},
    {id:"q4",sentence:"And so the frog must remain near the water where it can take a dip every now and then to keep from drying out.",chunks:["And so","the frog","must remain","near the water","where it can take a dip every now and then to keep from drying out"],labels:["Mod","S","V","C","Rel.Cl"],pattern:"SVC",concept:"2형식 remain + 장소 보어 + where 관계절",explanation:"핵심 뼈대: the frog(S) must remain(V) near the water(C). remain은 2형식. where절은 the water를 수식하는 관계절. 'to keep from drying out'는 목적 to부정사. 'every now and then'은 '가끔'의 관용 부사."},
    {id:"q5",sentence:"Frogs must also lay their eggs in water, as their fishlike ancestors did.",chunks:["Frogs","must also lay","their eggs","in water","as their fishlike ancestors did"],labels:["S","V","O","Mod","Adv.Cl"],pattern:"SVO + Mod",concept:"SVO + as 비교·방식 절",explanation:"핵심 뼈대: Frogs(S) must lay(V) their eggs(O). 'in water'는 장소 전치사구. 'as their fishlike ancestors did'는 방식·비교 부사절 — did는 lay their eggs를 대동사로 대체."},
    {id:"q6",sentence:"Eggs laid in the water must develop into water creatures, if they are to survive.",chunks:["Eggs laid in the water","must develop","into water creatures","if they are to survive"],labels:["S","V","Mod","Adv.Cl"],pattern:"SV + Mod",concept:"be to 용법 + 과거분사 수식 주어",explanation:"핵심 뼈대: Eggs(S) must develop(V) into water creatures(수식어). 'laid in the water'는 Eggs를 수식하는 과거분사구. 'if they are to survive'의 'be to-V'는 '~하려면/~할 운명'의 be to 용법.",linkedGrammar:{tp:"TP03","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Eggs [___] in the water must develop into water creatures, if they are to survive.", "options": ["laid", "laying"], "answer": "laid", "explanation": {"structure": "Eggs는 이 문장의 주어이고, 빈칸은 Eggs를 수식하는 분사 자리입니다.", "rule": "명사와 분사의 관계를 봐야 합니다. 알(Eggs)은 '놓여지는' 것이므로 수동 관계입니다. 수동 관계에는 과거분사(p.p.)를 씁니다.", "connection": "Eggs는 lay의 대상(목적어 관계)이므로 과거분사 laid가 맞습니다. laying은 능동 관계일 때 씁니다."}}},
    {id:"q7",sentence:"For frogs, metamorphosis thus provides the bridge between the water-dwelling young forms and the land-dwelling adults.",chunks:["For frogs,","metamorphosis","thus provides","the bridge","between the water-dwelling young forms and the land-dwelling adults"],labels:["Mod","S","V","O","Mod"],pattern:"SVO + Mod",concept:"SVO + between A and B 전치사구",explanation:"핵심 뼈대: metamorphosis(S) provides(V) the bridge(O). 'between the water-dwelling young forms and the land-dwelling adults'는 the bridge를 수식하는 전치사구. 두 명사구가 A and B 구조로 대조적 병렬."}
  ]},
  {id:"mock_2021_03_34",title:"21년 3월 모의 34번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"It is important to distinguish between being legally allowed to do something, and actually being able to go and do it.",chunks:["It","is","important","to distinguish between being legally allowed to do something, and actually being able to go and do it"],labels:["가S","V","C","진S"],pattern:"가주어 it ~ 진주어 to-V",concept:"가주어 it + 형용사 보어 + 진주어 to부정사",explanation:"It(가S) is(V) important(C) — 진주어는 to부정사구. 'to distinguish between A and B': between의 A(being legally allowed …)와 B(actually being able …)가 and로 병렬. 두 동명사구가 대조적으로 연결."},
    {id:"q2",sentence:"A law could be passed allowing everyone, if they so wish, to run a mile in two minutes.",chunks:["A law","could be passed","allowing everyone","if they so wish,","to run a mile in two minutes"],labels:["S","V","Mod","Adv.Cl","OC(Inf)"],pattern:"수동태 + 분사구문",concept:"수동태 + allowing 분사구문 + 삽입 조건절",explanation:"핵심 뼈대: A law(S) could be passed(V) — 수동태. 'allowing everyone … to run …'은 수동태 뒤에 오는 분사구문(결과). 'if they so wish'는 삽입된 조건절. allow + everyone(O) + to run(OC) — 5형식 구조 내포."},
    {id:"q3",sentence:"That would not, however, increase their effective freedom, because, although allowed to do so, they are physically incapable of it.",chunks:["That","would not increase","their effective freedom","because although allowed to do so, they are physically incapable of it"],labels:["S","V","O","Adv.Cl"],pattern:"SVO",concept:"SVO + because절(although 분사구문 중첩)",explanation:"핵심 뼈대: That(S) would not increase(V) their effective freedom(O). because절 안에 'although allowed to do so'는 양보 분사구문(although + p.p.). they are physically incapable of it — SVC 2형식(be incapable of)."},
    {id:"q4",sentence:"Having a minimum of restrictions and a maximum of possibilities is fine.",chunks:["Having a minimum of restrictions and a maximum of possibilities","is","fine"],labels:["S","V","C"],pattern:"SVC",concept:"동명사 주어(A and B 병렬) + 2형식",explanation:"동명사구가 주어: 'Having a minimum of restrictions'와 'a maximum of possibilities'가 and로 병렬. 하지만 동명사 Having 하나가 두 목적어를 거느리므로 단수 취급 → is(V) fine(C). SVC 2형식.",linkedGrammar:{tp:"TP26","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Having a minimum of restrictions and a maximum of possibilities [___] fine.", "options": ["is", "are"], "answer": "is", "explanation": {"structure": "이 문장의 주어는 동명사구 'Having a minimum of restrictions and a maximum of possibilities' 전체입니다.", "rule": "동명사구 전체가 주어일 때 단수 취급합니다. and로 연결되어 있어도 하나의 동명사(Having)가 이끄는 하나의 주어입니다.", "connection": "동명사구 주어는 단수로 취급하므로 is가 맞습니다. and가 있다고 해서 are를 쓰면 틀립니다."}}},
    {id:"q5",sentence:"Their effective freedom depends on actually having the means and ability to do what they choose.",chunks:["Their effective freedom","depends on","actually having the means and ability","to do what they choose"],labels:["S","V","O","Inf"],pattern:"SVO",concept:"depend on + 동명사 + to부정사 수식",explanation:"핵심 뼈대: Their effective freedom(S) depends on(V) actually having …(O). depend on은 전치사 포함 동사 — 목적어는 동명사(having). 'to do what they choose'는 ability를 수식하는 to부정사. 'what they choose'는 do의 목적어인 명사절.",linkedGrammar:{tp:"TP05","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Their effective freedom depends on actually [___] the means and ability to do what they choose.", "options": ["having", "to have"], "answer": "having", "explanation": {"structure": "이 문장의 핵심은 freedom depends on입니다.", "rule": "depend on의 on은 전치사입니다. 전치사 뒤에는 동명사(v-ing)가 옵니다. to부정사는 전치사 뒤에 올 수 없습니다.", "connection": "전치사 on 뒤 자리이므로 동명사 having이 맞습니다. to have는 전치사 바로 뒤에 올 수 없습니다."}}}
  ]},
  {id:"mock_2021_03_35",title:"21년 3월 모의 35번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"Today's music business has allowed musicians to take matters into their own hands.",chunks:["Today's music business","has allowed","musicians","to take matters into their own hands"],labels:["S","V","O","OC(Inf)"],pattern:"SVOC",concept:"allow + O + to-V (5형식)",explanation:"5형식: allow + O + to-V. Today's music business(S) has allowed(V) musicians(O) to take matters into their own hands(OC). 'take matters into one's own hands'는 '스스로 처리하다' 관용 표현."},
    {id:"q2",sentence:"Gone are the days of musicians waiting for a gatekeeper to say they are worthy of the spotlight.",chunks:["Gone","are","the days of musicians waiting for a gatekeeper to say they are worthy of the spotlight"],labels:["C","V","S"],pattern:"도치 구문(CVS)",concept:"형용사 도치 — Gone are the days",explanation:"원래 어순: The days … are gone. 형용사/분사(Gone)가 문두로 나오면 be동사와 주어가 도치. Gone(C) are(V) the days(S). 'of musicians waiting …'은 전치사구로 days 수식. 'to say they are worthy'는 gatekeeper 수식 to부정사.",linkedGrammar:{tp:"TP03","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Gone are the days of musicians [___] for a gatekeeper to say they are worthy of the spotlight.", "options": ["waiting", "waited"], "answer": "waiting", "explanation": {"structure": "musicians는 분사의 의미상 주어입니다.", "rule": "musicians와 wait의 관계를 봐야 합니다. 음악가들이 직접 '기다리는' 것이므로 능동 관계입니다. 능동 관계에는 현재분사(v-ing)를 씁니다.", "connection": "musicians가 능동적으로 기다리는 관계이므로 현재분사 waiting이 맞습니다. waited는 과거동사 형태로 명사를 수식하는 분사 자리에 올 수 없습니다."}}},
    {id:"q3",sentence:"In today's music business, you don't need to ask for permission to build a fanbase and you no longer need to pay thousands of dollars to a company to do it.",chunks:["In today's music business,","you don't need to ask for permission to build a fanbase","and you no longer need to pay thousands of dollars to a company to do it"],labels:["Mod","SVO절1","SVO절2"],pattern:"SVO (등위절 병렬)",concept:"SVO 두 절 and로 병렬 + need to-V",explanation:"두 절이 and로 연결: you don't need to ask … / you no longer need to pay …. need to-V 구조에서 to부정사가 목적어. 각 절에 추가 to부정사(to build / to do)가 수식어로 연결."},
    {id:"q4",sentence:"Every day, musicians are getting their music out to thousands of listeners without any outside help.",chunks:["Every day,","musicians","are getting their music out","to thousands of listeners","without any outside help"],labels:["Mod","S","V","Mod","Mod"],pattern:"SVO + Mod",concept:"구동사(get out) + without V-ing 수식어",explanation:"핵심 뼈대: musicians(S) are getting … out(V) their music(O). 'get music out'은 '음악을 내보내다' 구동사 — 현재진행형. 'to thousands of listeners'는 방향 전치사구. 'without any outside help'는 방식 전치사구."},
    {id:"q5",sentence:"They simply deliver it to the fans directly, without asking for permission or outside help to receive exposure or connect with thousands of listeners.",chunks:["They","simply deliver","it","to the fans directly","without asking for permission or outside help to receive exposure or connect with thousands of listeners"],labels:["S","V","O","Mod","Mod"],pattern:"SVO + Mod",concept:"SVO + without V-ing 방식 수식어",explanation:"핵심 뼈대: They(S) deliver(V) it(O). 'to the fans directly'는 방향+방식 수식어. 'without asking …'은 방식 전치사구(without + 동명사). permission과 outside help가 or로 병렬, 뒤에 to receive … or connect …가 목적 to부정사로 병렬."}
  ]},
  {id:"mock_2021_03_36",title:"21년 3월 모의 36번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"The rules of the game always include rules about the type of ball that is allowed, starting with the size and weight of the ball.",chunks:["The rules of the game","always include","rules about the type of ball that is allowed","starting with the size and weight of the ball"],labels:["S","V","O","Mod"],pattern:"SVO + 분사구문",concept:"SVO + starting with 분사구문",explanation:"핵심 뼈대: The rules(S) always include(V) rules(O). 'about the type of ball'은 rules(O)를 수식하는 전치사구. 관계절 'that is allowed'가 ball 수식. 'starting with …'는 부대상황 분사구문."},
    {id:"q2",sentence:"A ball might have the correct size and weight but if it is made as a hollow ball of steel it will be too stiff.",chunks:["A ball might have the correct size and weight","but if it is made as a hollow ball of steel,","it","will be","too stiff"],labels:["SVO절","Adv.Cl","S","V","C"],pattern:"SVC",concept:"조건 부사절 + 2형식 be too + 형용사",explanation:"핵심 뼈대: it(S) will be(V) too stiff(C). 'if it is made as a hollow ball of steel'은 조건 부사절 — 수동태(be made). 'too stiff'에서 too는 정도 초과 부사. 앞 절(might have …)과 but으로 대조.",linkedGrammar:{tp:"TP27","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "...if it [___] as a hollow ball of steel it will be too stiff.", "options": ["is made", "makes"], "answer": "is made", "explanation": {"structure": "이 절의 주어는 it(공)입니다.", "rule": "주어와 동사의 관계를 봐야 합니다. 공(it)은 '만들어지는' 것이지 스스로 '만드는' 것이 아닙니다. 수동 관계에는 be + p.p.를 씁니다.", "connection": "주어 it이 만들어지는 대상이므로 수동태 is made가 맞습니다. makes는 능동으로 의미상 맞지 않습니다."}}},
    {id:"q3",sentence:"If it is made from light foam rubber with a heavy center it will be too soft.",chunks:["If it is made from light foam rubber with a heavy center,","it","will be","too soft"],labels:["Adv.Cl","S","V","C"],pattern:"SVC",concept:"수동태 조건절 + 2형식 SVC",explanation:"핵심 뼈대: it(S) will be(V) too soft(C). If절은 조건 부사절 — 'is made from'은 재료를 나타내는 수동태 표현. 앞 문장(too stiff)과 이 문장(too soft)이 대조 쌍을 이룸."},
    {id:"q4",sentence:"A solid rubber ball would be too bouncy for most sports, and a solid ball made of clay would not bounce at all.",chunks:["A solid rubber ball would be too bouncy for most sports","and a solid ball made of clay","would not bounce","at all"],labels:["SVC절1","S","V","Mod"],pattern:"SV (등위 대조)",concept:"SVC + and + SV 대조 병렬",explanation:"첫 절: A solid rubber ball(S) would be(V) too bouncy(C) — 2형식. and 이하: a solid ball made of clay(S) would not bounce(V) — 완전자동사 SV. 'at all'은 부정 강조 부사. 'made of clay'는 과거분사구로 ball 수식. 두 절이 too bouncy(너무 탄성↑) vs not bounce(탄성 없음)으로 대조."},
    {id:"q5",sentence:"Similarly, along with stiffness, a ball needs to bounce properly.",chunks:["Similarly,","along with stiffness,","a ball","needs","to bounce properly"],labels:["Mod","Mod","S","V","O"],pattern:"SVO",concept:"SVO — need + to부정사 목적어",explanation:"핵심 뼈대: a ball(S) needs(V) to bounce properly(O). need는 to부정사를 목적어로 취하는 동사. 'Similarly'는 앞 문장(stiffness)과 유사한 논점을 도입하는 접속 부사. 'along with stiffness'는 함께 논의되는 추가 조건 전치사구."}
  ]},
  {id:"mock_2021_03_37",title:"21년 3월 모의 37번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"It would take too long to write and it would be hard to read quickly.",chunks:["It would take too long to write","and it would be hard to read quickly"],labels:["가S+V+C+진S절1","가S+V+C+진S절2"],pattern:"가주어 it 병렬",concept:"가주어 it 구문 두 개 and 병렬",explanation:"두 절 모두 가주어 it 구문. It would take too long (to write) / It would be hard (to read quickly). to write와 to read quickly가 각각 진주어. 두 절이 and로 병렬 — 같은 구조 반복으로 대칭 효과."},
    {id:"q2",sentence:"Chemists have to write chemical equations all the time, and it would take too long to write and read if they had to spell everything out.",chunks:["Chemists have to write chemical equations all the time,","and it would take too long to write and read","if they had to spell everything out"],labels:["SVO절","가주어절","Adv.Cl"],pattern:"SVO + 가정법",concept:"가주어 it + 가정법과거 if절",explanation:"첫 절: Chemists(S) have to write(V) chemical equations(O). 두 번째 절: 가주어 it — 'to write and read'가 진주어. 'if they had to spell everything out'은 가정법과거 조건절(현재 사실의 반대 가정). 'spell out'은 '다 풀어 쓰다' 구동사."},
    {id:"q3",sentence:"A chemical formula lists all the elements that form each molecule and uses a small number to the bottom right of an element's symbol to stand for the number of atoms of that element.",chunks:["A chemical formula","lists all the elements that form each molecule","and uses a small number to the bottom right of an element's symbol","to stand for the number of atoms of that element"],labels:["S","V1+O","V2+O","Inf"],pattern:"SVO (동사 2개 병렬)",concept:"주어 하나 + 동사 2개 병렬 + to부정사 목적",explanation:"A chemical formula(S)가 주어. lists(V1) all the elements …와 uses(V2) a small number …가 and로 병렬. 관계절 'that form each molecule'이 elements 수식. 'to stand for …'는 목적 to부정사."},
    {id:"q4",sentence:"That tells us that a water molecule is made up of two hydrogen atoms and one oxygen atom.",chunks:["That","tells","us","that a water molecule is made up of two hydrogen atoms and one oxygen atom"],labels:["S","V","IO","DO"],pattern:"SVOO",concept:"4형식 tell + IO + DO(that절)",explanation:"4형식: tell + IO(us) + DO(that절). That(S) tells(V) us(IO) that절(DO). that절 내부: a water molecule(S) is made up of(V) — 수동태 구동사. 'two hydrogen atoms and one oxygen atom'이 병렬로 전치사 of의 목적어."}
  ]},
  {id:"mock_2021_03_40",title:"21년 3월 모의 40번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"In one study, researchers asked pairs of strangers to sit down in a room and chat.",chunks:["In one study,","researchers","asked","pairs of strangers","to sit down in a room and chat"],labels:["Mod","S","V","O","OC(Inf)"],pattern:"SVOC",concept:"ask + O + to-V (5형식)",explanation:"5형식: ask + O + to-V. researchers(S) asked(V) pairs of strangers(O) to sit down … and chat(OC). to부정사 안에 sit down과 chat 두 동사가 and로 병렬. 'In one study'는 연구 맥락 전치사구 수식어.",linkedGrammar:{tp:"TP19","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "...researchers asked pairs of strangers [___] down in a room and chat.", "options": ["to sit", "sitting"], "answer": "to sit", "explanation": {"structure": "이 문장의 핵심은 researchers asked pairs입니다.", "rule": "ask는 5형식 동사로 'ask + 목적어 + to-v' 형태를 취합니다.", "connection": "ask + 목적어(pairs) 뒤에는 to부정사가 목적격보어로 옵니다. sitting은 이 자리에 올 수 없습니다."}}},
    {id:"q2",sentence:"In half of the rooms, a cell phone was placed on a nearby table; in the other half, no phone was present.",chunks:["In half of the rooms,","a cell phone was placed on a nearby table","in the other half,","no phone was present"],labels:["Mod","수동태절","Mod","수동태절"],pattern:"수동태 대조",concept:"수동태 두 절 세미콜론 대조",explanation:"두 절이 세미콜론(;)으로 대조: a cell phone was placed(수동태) vs no phone was present. 'was placed'는 be + p.p. 수동태. 'was present'는 be + 형용사(present) — SVC 2형식처럼 보이지만 present는 형용사.",linkedGrammar:{tp:"TP27","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "In half of the rooms, a cell phone [___] on a nearby table.", "options": ["was placed", "placed"], "answer": "was placed", "explanation": {"structure": "이 문장의 주어는 a cell phone입니다.", "rule": "주어와 동사의 관계를 봐야 합니다. 핸드폰(a cell phone)은 '놓여진' 것이지 스스로 '놓는' 것이 아닙니다. 수동 관계에는 be + p.p.를 씁니다.", "connection": "주어 a cell phone은 놓여지는 대상이므로 수동태 was placed가 맞습니다."}}},
    {id:"q3",sentence:"When a cell phone was present in the room, the participants reported the quality of their relationship was worse than those who'd talked in a cell phone-free room.",chunks:["When a cell phone was present in the room,","the participants","reported","the quality of their relationship was worse than those who'd talked in a cell phone-free room"],labels:["Adv.Cl","S","V","O"],pattern:"SVO",concept:"SVO — that절(that 생략) 목적어 + when 부사절",explanation:"핵심 뼈대: the participants(S) reported(V) that절(O) — that 생략. that절 내부: the quality(S) was(V) worse(C) — SVC 비교급. 'than those who'd talked …'는 비교 기준절. When절은 상황 부사절."},
    {id:"q4",sentence:"The pairs who talked in the rooms with cell phones thought their partners showed less empathy.",chunks:["The pairs","who talked in the rooms with cell phones","thought","their partners showed less empathy"],labels:["S","Rel.Cl","V","O"],pattern:"SVO",concept:"관계절 수식 주어 + SVO(that절 생략)",explanation:"핵심 뼈대: The pairs(S) thought(V) that절(O) — that 생략. 'who talked in the rooms with cell phones'는 The pairs를 수식하는 관계절. that절 내부: their partners(S) showed(V) less empathy(O) — SVO."},
    {id:"q5",sentence:"You might have felt good about yourself because you didn't pick it up to check your messages.",chunks:["You","might have felt","good about yourself","because you didn't pick it up to check your messages"],labels:["S","V","C","Adv.Cl"],pattern:"SVC",concept:"2형식 feel + 형용사구 보어 + because 부사절",explanation:"핵심 뼈대: You(S) might have felt(V) good(C). 'good about yourself'에서 good은 feel의 형용사 보어, 'about yourself'는 전치사구로 good 수식. because절은 이유 부사절. 'pick it up'은 구동사, to check는 목적 to부정사.",linkedGrammar:{"type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "You might [___] good about yourself because you didn't pick it up to check your messages.", "options": ["have felt", "feel"], "answer": "have felt", "explanation": {"structure": "이 문장은 과거의 상황에 대한 추측입니다.", "rule": "'might have + p.p.'는 과거에 일어났을 가능성을 나타냅니다. 'might + 동사원형'은 현재/미래의 가능성에 씁니다.", "connection": "핸드폰을 집지 않은 것은 이미 일어난 과거의 행동이므로, 그때 기분이 좋았을 것이라는 과거 추측 have felt가 맞습니다."}, "tp": "TP32_modal"}},
    {id:"q6",sentence:"Your unchecked messages were still hurting your connection with the person sitting across from you.",chunks:["Your unchecked messages","were still hurting","your connection","with the person sitting across from you"],labels:["S","V","O","Mod"],pattern:"SVO",concept:"SVO — 현재진행 수동 vs 능동 구분",explanation:"핵심 뼈대: Your unchecked messages(S) were hurting(V) your connection(O). 과거진행형 능동태(were V-ing). 'with the person sitting across from you'는 전치사구로 connection 수식. 'sitting across from you'는 person을 수식하는 현재분사구."}
  ]},
  {id:"mock_2021_03_4142",title:"21년 3월 모의 41~42번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"As kids, we worked hard at learning to ride a bike; when we fell off, we got back on again, until it became second nature to us.",chunks:["As kids,","we worked hard at learning to ride a bike","when we fell off,","we got back on again","until it became second nature to us"],labels:["Mod","SV절","Adv.Cl","SV절","Adv.Cl"],pattern:"SV (부사절 중첩)",concept:"부사절 중첩 + until절 + get back on 구동사",explanation:"두 개의 주절(we worked / we got back)이 세미콜론으로 연결. When절(시간)과 until절(결과)이 각각 부사절로 붙음. 'work hard at V-ing': 전치사 at의 목적어로 동명사. 'it became second nature to us': SVC — it이 bike riding을 가리킴."},
    {id:"q2",sentence:"But when we try something new in our adult lives, we'll usually make just one attempt before judging whether it's worked.",chunks:["But when we try something new in our adult lives,","we","will usually make","just one attempt","before judging whether it's worked"],labels:["Adv.Cl","S","V","O","Mod"],pattern:"SVO + Mod",concept:"SVO + before V-ing + whether 간접의문문",explanation:"핵심 뼈대: we(S) will make(V) just one attempt(O). 'before judging …'는 시간 전치사구(before + 동명사). 'whether it's worked'는 judging의 목적절(간접의문문). When절은 시간 부사절."},
    {id:"q3",sentence:"If we don't succeed the first time, or if it feels a little awkward, we'll tell ourselves it wasn't a success rather than giving it another shot.",chunks:["If we don't succeed the first time, or if it feels a little awkward,","we","will tell","ourselves","it wasn't a success rather than giving it another shot"],labels:["Adv.Cl","S","V","IO","DO"],pattern:"SVOO",concept:"4형식 tell + IO + DO + rather than V-ing",explanation:"4형식: tell + IO(ourselves) + DO(it wasn't a success). 두 If절이 or로 연결된 조건 부사절. 'rather than giving it another shot'는 대조 전치사구(rather than + 동명사). 'give it another shot'은 '한 번 더 시도하다' 관용 표현.",linkedGrammar:{tp:"TP05","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "...we'll tell ourselves it wasn't a success rather than [___] it another shot.", "options": ["giving", "to give"], "answer": "giving", "explanation": {"structure": "rather than은 전치사처럼 기능합니다.", "rule": "전치사 뒤에는 동명사(v-ing)가 옵니다. rather than 뒤에도 동명사가 옵니다.", "connection": "rather than 뒤이므로 동명사 giving이 맞습니다. to give는 전치사 뒤에 올 수 없습니다."}}},
    {id:"q4",sentence:"Consider the idea that your brain has a network of neurons.",chunks:["Consider","the idea","that your brain has a network of neurons"],labels:["V","O","동격절"],pattern:"명령문",concept:"명령문 + 동격 that절",explanation:"명령문: Consider(V) the idea(O). 'that your brain has a network of neurons'는 the idea와 동격 관계인 that절 — idea의 내용을 구체적으로 설명. 동격 that절 vs 관계절 구분: 동격절은 idea의 내용, 관계절은 idea의 특성."},
    {id:"q5",sentence:"Those connections aren't very reliable at first, which may make your first efforts a little hit-and-miss.",chunks:["Those connections","aren't","very reliable","at first","which may make your first efforts a little hit-and-miss"],labels:["S","V","C","Mod","Rel.Cl"],pattern:"SVC",concept:"2형식 SVC + which 계속적 관계절(SVOC)",explanation:"핵심 뼈대: Those connections(S) aren't(V) very reliable(C). 'at first'는 시간 수식어. 'which may make …'는 앞 절 전체를 선행사로 하는 계속적 관계절. 관계절 내부: make(V) your first efforts(O) a little hit-and-miss(OC) — 5형식.",linkedGrammar:{tp:"TP10","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Those connections aren't very reliable at first, [___] may make your first efforts a little hit-and-miss.", "options": ["which", "that"], "answer": "which", "explanation": {"structure": "쉼표 뒤에서 앞 절 전체를 선행사로 받는 관계절입니다.", "rule": "앞 절 전체나 명사를 선행사로 하는 계속적 용법(쉼표 + 관계사)에는 which를 씁니다. that은 계속적 용법으로 쓸 수 없습니다.", "connection": "쉼표 뒤에서 앞 내용 전체를 받는 계속적 용법이므로 which가 맞습니다."}}},
    {id:"q6",sentence:"Repetition of an action reinforces the connections between the neurons involved in that action.",chunks:["Repetition of an action","reinforces","the connections","between the neurons involved in that action"],labels:["S","V","O","Mod"],pattern:"SVO",concept:"SVO + between 전치사구 + 과거분사 수식",explanation:"핵심 뼈대: Repetition(S) reinforces(V) the connections(O). 'of an action'은 Repetition 수식 전치사구. 'between the neurons involved in that action'은 connections 수식 전치사구. 'involved in that action'은 neurons를 수식하는 과거분사구."},
    {id:"q7",sentence:"That means the more times you try using that new feedback technique, the more easily it will come to you when you need it.",chunks:["That","means","the more times you try using that new feedback technique,","the more easily it will come to you when you need it"],labels:["S","V","O(the 비교절1)","O(the 비교절2)"],pattern:"SVO",concept:"SVO — that절 목적어 + the 비교급 ~ the 비교급",explanation:"핵심 뼈대: That(S) means(V) that절(O). that절 내부가 'the 비교급 ~, the 비교급 …' 구문: 'the more times …, the more easily …'. try + V-ing: try 뒤에 동명사(using). when you need it은 시간 부사절로 내포."}
  ]},
  {id:"jungang_h1_2021_03",title:"중앙고1 21년 3월 모의 20~23번",level:"고1",levelClass:"lv-adv",questions:[
    {id:"q1",sentence:"If you haven't sent it, you still have time to fix it.",chunks:["If you haven't sent it,","you","still have","time","to fix it"],labels:["Adv.Cl","S","V","O","Inf"],pattern:"SVO",concept:"부사절 + to부정사",explanation:"핵심 뼈대: you(S) still have(V) time(O). 'to fix it'은 time을 수식하는 to부정사구. If절은 전체 문장을 수식하는 부사절로, 문장 앞에 오면 콤마로 분리.",linkedGrammar:{type:"choice",question:"다음 중 빈칸에 들어갈 말로 가장 적절한 것은?",stem:"If you haven't sent it, you still have time [___] it.",options:["to fix","fixing"],answer:"to fix",explanation:{structure:"이 문장의 핵심은 you still have time입니다.",rule:"time 뒤에는 그 시간을 어떻게 쓰는지 설명하는 to부정사가 자주 옵니다.",connection:"여기서는 '고칠 시간'이라는 뜻이므로 time을 설명하는 to fix가 맞습니다. 따라서 fixing이 아니라 to fix가 정답입니다."}}},
    {id:"q2",sentence:"The internal pressure you place on yourself is normal and useful.",chunks:["The internal pressure","you place on yourself","is","normal and useful"],labels:["S","Rel.Cl","V","C"],pattern:"SVC",concept:"관계절이 수식하는 주어",explanation:"주어: The internal pressure(핵심 S) + you place on yourself(관계절). 핵심 뼈대: The internal pressure … is(V) normal and useful(C). SVC 구조."},
    {id:"q3",sentence:"When you doubt your ability, your self-worth suffers.",chunks:["When you doubt your ability,","your self-worth","suffers"],labels:["Adv.Cl","S","V"],pattern:"SV",concept:"SV + 부사절(when)",explanation:"핵심 뼈대: your self-worth(S) suffers(V). suffer는 완전자동사. When절은 시간 부사절."},
    {id:"q4",sentence:"Doubt causes you to see experiences as a reflection of your own shortcomings.",chunks:["Doubt","causes","you","to see experiences","as a reflection of your own shortcomings"],labels:["S","V","O","OC(Inf)","C"],pattern:"SVOC",concept:"cause + O + to-V (5형식)",explanation:"cause + O + to-V 는 5형식. Doubt(S) causes(V) you(O) to see experiences(OC). 'as a reflection of …'는 see의 보어.",linkedGrammar:{tp:"TP19","type": "choice", "question": "다음 중 빈칸에 들어갈 말로 가장 적절한 것은?", "stem": "Doubt causes you [___] experiences as a reflection of your own shortcomings.", "options": ["to see", "seeing"], "answer": "to see", "explanation": {"structure": "이 문장의 핵심은 Doubt causes you입니다.", "rule": "cause는 5형식 동사로 'cause + 목적어 + to-v' 형태를 취합니다.", "connection": "cause + 목적어(you) 뒤에는 to부정사가 목적격보어로 옵니다. seeing은 이 자리에 올 수 없습니다."}}},

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  if(a.length>1&&JSON.stringify(a)===JSON.stringify(arr.map((_,i)=>i))){const t=a[0];a[0]=a[1];a[1]=t;}
  return a;
}
function lblCls(l){return{S:'lS',V:'lV',O:'lO',C:'lC',IO:'lIO',DO:'lDO',OC:'lOC','OC(Inf)':'lOC',Mod:'lMod',Inf:'lInf','Adv.Cl':'lAdvCl','Rel.Cl':'lRelCl',Comp:'lComp','가S':'lGS','실S':'lRS'}[l]||'lDef';}
/* 학생에게 보이는 라벨 — Mod → 수식어 */
function displayLabel(l){
  if(!l) return l;
  if(l==='Mod') return '수식어';
  if(l==='O')   return '목적어';
  if(l==='IO')  return '목적어';
  if(l==='DO')  return '목적어';
  if(l==='Adv.Cl') return '부사절';
  if(l==='Rel.Cl') return '관계절';
  if(l==='Inf') return '부정사구';
  if(l==='Comp') return '비교';
  return l;
}

/* ── concept → 학생용 접근 힌트 변환 (대화형) ── */
function conceptToHint(concept){
  if(!concept) return '"누가(주어)" 하는지 먼저 볼까요? 그 다음 동사를 찾으면 문장이 보여요 😊';
  const c=concept;
  if(/가주어|가S|It.*진주어|it.*to-V/i.test(c))
    return '앞에 있는 It은 가짜 주어예요 👀 진짜 주어는 뒤쪽에 숨어 있어요 — 찾아볼까요?';
  if(/도치|CVS|INV/i.test(c))
    return '이 문장, 주어와 동사가 자리를 바꿨어요! 먼저 동사부터 찾고, 주어가 어디 있는지 역으로 확인해봐요 🔍';
  if(/명령문/i.test(c))
    return '주어가 숨어 있는 문장이에요. 제일 앞 단어부터 확인해볼까요? 동사가 바로 나올 거예요 💡';
  if(/동명사.*주어|주어.*동명사|GS/i.test(c))
    return '동사처럼 생긴 말이 주어 자리에 있어요. 뒤쪽에서 진짜 동사(~한다)를 찾아보면 구조가 보여요 🎯';
  if(/관계절.*주어|주어.*관계절|Rel\.Cl/i.test(c))
    return '주어 뒤에 긴 설명이 붙어 있어요. 핵심 주어만 먼저 잡고, 동사를 찾아볼게요 — 설명은 나중에 붙여요 😌';
  if(/5형식|SVOC|목적어.*보어|O.*C/i.test(c))
    return '동사 뒤에 목적어가 있고, 그 다음 목적어를 설명하는 말이 와요. 동사 → 목적어 → 설명, 이 순서로 찾아볼까요? 🧩';
  if(/4형식|SVOO|간접.*직접|IO.*DO/i.test(c))
    return '동사 뒤에 두 개의 자리가 있어요. "누구에게" 먼저, 그 다음 "무엇을" 순서로 잡아볼게요 📦';
  if(/부사절|Adv\.Cl|when|because|if절|while|although/i.test(c))
    return '긴 부사절이 있지만 겁먹지 말아요! 주절(누가 + 한다)을 먼저 찾고, 나머지는 나중에 붙이면 돼요 💪';
  if(/명사절|that절 목적어|that절.*O|간접의문문|whether/i.test(c))
    return '동사 뒤에 절 전체가 목적어로 와요. 주절의 동사를 먼저 잡고, 뒤 절을 하나의 덩어리로 보면 쉬워요 🎯';
  if(/관계절|Rel\.Cl|관계사/i.test(c))
    return '명사를 꾸미는 설명 덩어리가 있어요. 핵심 주어·동사부터 잡고, 설명은 나중에 붙여볼까요? 😊';
  if(/2형식|SVC|감각동사|seem|look|become|remain|stay/i.test(c))
    return '이 동사 뒤에는 목적어가 아니라 "어떤 상태인지"를 설명하는 말이 와요. 동사부터 찾고, 뒤에 뭐가 있는지 볼게요 👁️';
  if(/병렬|등위|and.*V|V1.*V2/i.test(c))
    return '두 개 이상의 동사가 나란히 연결된 문장이에요. 하나씩 찾아가며 완성해봐요 — 생각보다 규칙적이에요 ✨';
  if(/비교|more.*than|배수|as.*as/i.test(c))
    return '비교하는 표현이 있어요. 핵심 뼈대(누가 + 한다)를 먼저 잡고, 비교 부분은 나중에 붙여볼게요 📊';
  if(/수동태|be.*p\.p\.|passive/i.test(c))
    return '"무언가가 어떻게 됐는지"를 표현하는 문장이에요. "무엇이(주어)"부터 찾고, 동사를 확인해볼까요? 🔄';
  if(/분사구문|V-ing.*구문|p\.p\..*구문/i.test(c))
    return '앞에 수식어 덩어리가 있어요. 주절의 "누가 + 한다"부터 먼저 잡고, 앞 덩어리는 나중에 붙여요 🧱';
  if(/SVO/i.test(c))
    return '"누가(주어)" 하는지 먼저 볼까요? 그 다음 동사, 그리고 뭘 하는지 순서로 찾으면 돼요 😌';
  if(/SV/i.test(c))
    return '이 문장은 주어와 동사만으로 완성돼요. "누가 + 한다"를 먼저 잡아볼까요? 생각보다 단순해요 💡';
  return '"누가(주어)" 하는지 먼저 볼까요? 그 다음 동사를 찾으면 문장이 보여요 😊';
}

      <div style="font-size:12px;color:#94a3b8;margin-bottom:20px">비밀번호를 입력하세요</div>
      <input id="adminPwInput" type="password" placeholder="••••••"
        autocomplete="off"
        style="width:100%;padding:12px 14px;font-size:18px;letter-spacing:4px;border:2px solid #e2e8f0;border-radius:10px;outline:none;text-align:center;margin-bottom:8px"
        onkeydown="if(event.key==='Enter')confirmAdminPw()">
      <div id="adminPwErr" style="font-size:12px;color:#dc2626;text-align:center;height:16px;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <button type="button" onclick="document.getElementById('adminModal').remove()"
          style="flex:1;padding:11px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:14px;font-weight:700;color:#64748b;cursor:pointer">취소</button>
        <button type="button" onclick="confirmAdminPw()"
          style="flex:2;padding:11px;border-radius:10px;border:none;background:#1B3A5C;font-size:14px;font-weight:700;color:#fff;cursor:pointer">확인</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>{const el=document.getElementById('adminPwInput');if(el)el.focus();},80);
  /* 모달 바깥 클릭 시 닫기 */
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
}

function confirmAdminPw(){
  const el=document.getElementById('adminPwInput');
  const err=document.getElementById('adminPwErr');
  if(!el)return;
  const pw=el.value;
  if(pw==='0411'){
    document.getElementById('adminModal').remove();
    S.sc='admin';R();
  } else {
    if(err) err.textContent='비밀번호가 틀렸습니다.';
    el.value='';
    el.focus();
  }
}

/* ── 2. 세트 선택 ── */
