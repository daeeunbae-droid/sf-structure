/* ── 3. 문제 풀이 ── */
function rQuiz(a){
  const q=curQ();
  const tot=totQ();
  const pct=Math.round((S.qi/tot)*100);
  const isTest=S.mode==='test';
  const isStudy=!isTest;
  const lblTop=(S.showLabels&&!S.submitted)?'margin-top:14px':'';

  function ckHtml(ci,zone,pos){
    const raw=q.chunks[ci], label=q.labels[ci];
    /* 뱅크: 첫 글자 소문자 (위치 힌트 제거) / 답안·제출 후: 원문 유지 */
    const text=(zone==='bank'&&!S.submitted)?lcFirst(raw):raw;
    const lbl=(S.showLabels&&!S.submitted&&label)?`<span class="ck-lbl ${lblCls(label)}">${label}</span>`:'';
    let cls=zone==='bank'?'ck ck-bank':'ck ck-ans';
    if(S.submitted&&zone==='ans') cls=S.lastOk?'ck ck-ok':'ck ck-no';
    const drag=S.submitted?'':'draggable="true"';
    const clk=S.submitted?'':(zone==='bank'?`onclick="clickBank(${pos})"`:`onclick="clickAns(${pos})"`);
    return`<button class="${cls}" style="${lblTop}" data-zone="${zone}" data-pos="${pos}" data-ci="${ci}" ${drag} ${clk}>${lbl}${text}</button>`;
  }

  const bankHtml=S.bankOrder.length
    ?S.bankOrder.map((ci,bi)=>ckHtml(ci,'bank',bi)).join('')
    :`<span style="font-size:12px;color:#94a3b8;padding:8px">모든 청크 배치 완료</span>`;
  const ansHtml=S.answerOrder.length
    ?S.answerOrder.map((ci,ai)=>ckHtml(ci,'ans',ai)).join('')
    :`<span class="zone-ph">여기에 청크를 배열하세요</span>`;

  const hintRow=(isStudy&&!S.submitted)?`
    <div class="hint-row">
      <span class="hint-lbl">💡 라벨 힌트 보기</span>
      <label class="sw"><input type="checkbox" ${S.showLabels?'checked':''} onchange="toggleLabels(this.checked)"><span class="sl"></span></label>
    </div>`:'';

  const allPlaced=S.bankOrder.length===0;
  const btnRow=!S.submitted?`
    <div class="btn-row">
      <button class="btn bGray" style="flex:1" onclick="resetChunks()">초기화</button>
      <button class="btn bn" style="flex:2" onclick="submitAnswer()" ${allPlaced?'':'disabled'}>
        ${allPlaced?'제출 →':`남은 청크: ${S.bankOrder.length}개`}
      </button>
    </div>`:'';

  let fb='';
  if(S.submitted){
    const isLast=S.qi+1>=tot;
    const curR=S.results.find(r=>r.qi===S.qi);
    /* 1초 딜레이 후에만 다음 버튼 표시 */
    const nextBtn=S.showNext
      ?`<button class="btn ${isLast?'bg':'bn'} mt12" onclick="${isLast?'finishQuiz()':'nextQ()'}">
          ${isLast?'결과 보기 🏁':'다음 문제 →'}</button>`
      :`<div style="font-size:11px;color:#94a3b8;text-align:center;margin-top:12px;padding:4px">잠시 후 다음 버튼이 나타납니다...</div>`;

    if(S.lastOk){
      /* 정답 */
      const pts=curR?curR.pts:0;
      fb=`<div class="fdb ok">✅ 정답! &nbsp;<span style="font-size:13px">${pts}점 획득</span></div>`;
      if(isStudy){
        if(!S.showExpl) fb+=`<button class="btn bGray mt8" style="font-size:13px" onclick="showExpl()">📖 설명 보기</button>`;
        else fb+=`<div class="expl-box mt8"><div class="expl-ttl"><span class="pattern-badge">${q.pattern}</span><span class="concept-tag">${q.concept}</span></div><div style="margin-top:8px">${q.explanation}</div></div>`;
      }
      fb+=nextBtn;
    } else {
      /* 오답 — 즉시 정답 표시 */
      const caHtml=q.chunks.map(c=>`<span class="ca-ck">${c}</span>`).join('');
      fb=`<div class="fdb no">❌ 오답</div>
        <div class="ca-box"><div class="ca-lbl">정답 순서</div><div class="ca-chunks">${caHtml}</div></div>`;

      /* 학습 모드 + 1차 오답 → 다시 시도 버튼 (정답 보여주고 위에 있음) */
      if(isStudy&&S.attempts<2){
        fb+=`<div class="btn-row mt8"><button class="btn bn" onclick="retryQ()">다시 시도 (1회 남음)</button></div>`;
        /* 다시 시도 중에는 이의신청/설명/다음 버튼 없음 */
      } else {
        /* 테스트 모드 또는 학습 2회 소진 → 이의신청 + (설명) + 다음 */
        const isDisp=curR&&curR.disputed;
        if(!isDisp) fb+=`<button class="btn bYellow mt8" style="font-size:13px" onclick="disputeQ()">📋 내 답도 맞아요</button>`;
        else fb+=`<div class="fdb disp mt8">📋 검토 대기 중 — 선생님이 확인합니다</div>`;

        if(isStudy){
          if(!S.showExpl) fb+=`<button class="btn bGray mt8" style="font-size:13px" onclick="showExpl()">📖 설명 보기</button>`;
          else fb+=`<div class="expl-box mt8"><div class="expl-ttl"><span class="pattern-badge">${q.pattern}</span><span class="concept-tag">${q.concept}</span></div><div style="margin-top:8px">${q.explanation}</div></div>`;
        }
        fb+=nextBtn;
      }
    }
  }

  a.innerHTML=`
    <div class="card">
      <div class="quiz-header">
        <span class="q-num">문제 ${S.qi+1} / ${tot}</span>
        ${isTest?`<span class="q-score">점수: ${S.score} / ${S.qi*2}점</span>`:`<span class="q-mode">📖 학습 모드</span>`}
      </div>
      <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
      ${hintRow}
      <div class="zone-lbl">내 답안</div>
      <div class="answer-zone ${S.answerOrder.length===0?'empty':''}" id="ans-zone" style="${S.showLabels&&!S.submitted?'padding-top:8px':''}">${ansHtml}</div>
      <div class="zone-lbl">청크 뱅크</div>
      <div class="bank-zone" id="bank-zone">${bankHtml}</div>
      ${btnRow}
      ${fb}
    </div>
    <button class="btn bGray" style="margin-top:0" onclick="backToSelect()">← 세트 선택으로</button>`;

  if(!S.submitted) bindDrag();
}

/* ── 4. 결과 ── */
function rResult(a){
  /* 이전 dispute 리스너 정리 */
  if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}

  const tot=totQ(), maxPt=tot*2;
  const pct=maxPt?Math.round((S.score/maxPt)*100):0;
  const isTest=S.mode==='test';
  const dispCount=S.results.filter(r=>r.disputed).length;
  const qList=S.testQuestions||S.set.questions;  /* 출제된 문제 배열 */

  if(isTest&&DB){
    const allCount=S.set.questions.length;
    DB.ref(`structure_results/${sKey(S.name)}/${S.set.id}_${Date.now()}`).set({
      name:S.name,setId:S.set.id,setTitle:S.set.title,
      score:S.score,maxScore:maxPt,pct,
      sampleRate,sampledCount:tot,totalCount:allCount,
      date:new Date().toISOString()
    });
  }

  const rows=S.results.map((r,i)=>{
    const q=qList[i];
    let tag=r.disputed?`<span class="res-tag res-disp">📋 검토중</span>`:
      r.approved?`<span class="res-tag res-ok">✅ 정답처리</span>`:
      r.pts>0?`<span class="res-tag res-ok">${r.pts===2?'✓ 2점':'✓ 1점'}</span>`:
      `<span class="res-tag res-no">✗ 0점</span>`;
    return`<div class="res-row">
      <span style="font-size:11px;font-weight:700;color:#94a3b8;flex-shrink:0;width:20px">${i+1}</span>
      <span class="res-sent">${q.sentence}</span>
      ${isTest?tag:''}
    </div>`;
  }).join('');

  const totalCount=S.set.questions.length;
  const sampledInfo=isTest&&tot<totalCount
    ?`<div style="font-size:12px;color:#64748b;margin-top:4px">전체 ${totalCount}문항 중 ${tot}문항 출제 (${Math.round(sampleRate*100)}%)</div>`
    :'';

  a.innerHTML=`
    <div class="card" style="text-align:center">
      <div class="em">${pctEmoji(pct)}</div>
      <div style="font-size:12px;color:#888;margin-bottom:2px">${S.name} · ${S.set.title}</div>
      ${sampledInfo}
      ${isTest?`
        <div class="rs-score" style="margin-top:8px">${S.score}<span> / ${maxPt}점</span></div>
        <div class="rs-pct" style="color:${pctColor(pct)}">${pct}%${dispCount?` (검토 ${dispCount}건)`:''}</div>
        <div class="pb mt8"><div style="height:100%;width:${pct}%;background:${pctColor(pct)};border-radius:99px;transition:width .6s"></div></div>
      `:`<div style="font-size:18px;font-weight:800;color:#1B3A5C;margin:8px 0">학습 완료!</div>
        <div style="font-size:13px;color:#64748b">총 ${tot}문장 구조 복원 훈련</div>`}
    </div>
    ${dispCount?`<div style="font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;margin-bottom:14px">📋 이의신청 ${dispCount}건 — 선생님이 확인 후 처리합니다.</div>`:''}
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:10px">📋 문장별 결과</div>
      ${rows}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;padding-bottom:20px">
      ${isTest?`<button class="btn bGray" onclick="copyResult()">📋 결과 복사 (학부모 전달용)</button>`:''}
      <button class="btn bn" onclick="retakeSet()">같은 세트 다시 풀기</button>
      <button class="btn bo" onclick="backToSelect()">← 세트 선택으로</button>
    </div>`;

  /* ── 이의신청 실시간 리스너 ── */
  if(isTest && dispCount>0 && DB){
    const ref=DB.ref('structure_disputes');
    window._sfDisputeRef=ref;
    ref.on('value',snap=>{
      let changed=false;
      snap.forEach(ch=>{
        const v=ch.val();
        if(v.name!==S.name||v.setId!==S.set.id)return;
        if(v.status==='approved'){
          const r=S.results.find(x=>x.qi===v.qi&&x.disputed);
          if(r){r.disputed=false;r.approved=true;r.pts=1;r.correct=true;S.score+=1;changed=true;}
        }else if(v.status==='rejected'){
          const r=S.results.find(x=>x.qi===v.qi&&x.disputed);
          if(r){r.disputed=false;r.approved=false;changed=true;}
        }
      });
      if(changed)R();
    });
  }
}

/* 결과 복사 */
function copyResult(){
  const qList=S.testQuestions||S.set.questions;
  const tot=totQ(), maxPt=tot*2;
  const pct=maxPt?Math.round((S.score/maxPt)*100):0;
  const pairs=S.results.map((r,i)=>({r,q:qList[i]}));
  const wrong   = pairs.filter(x=>x.r.pts===0&&!x.r.disputed&&!x.r.approved);
  const disp    = pairs.filter(x=>x.r.disputed);
  const approved= pairs.filter(x=>x.r.approved);
  let t=`[SF English Structure 결과]\n학생: ${S.name}\n날짜: ${todayStr()}\n세트: ${S.set.title}\n점수: ${S.score} / ${maxPt}점 (${pct}%)\n\n`;
  if(approved.length){t+=`■ ✅ 정답 처리됨 (이의신청 승인 ${approved.length}개)\n`;approved.forEach(({q},i)=>{t+=`${i+1}. ${q.sentence}\n`;});t+='\n';}
  if(wrong.length){t+=`■ 틀린 문장 (${wrong.length}개)\n`;wrong.forEach(({q},i)=>{t+=`${i+1}. ${q.sentence}\n`;});t+='\n';}
  if(disp.length){t+=`■ 이의신청 검토 중 (${disp.length}개)\n`;disp.forEach(({q},i)=>{t+=`${i+1}. ${q.sentence}\n`;});t+='\n';}
  if(!wrong.length&&!disp.length&&!approved.length) t+=`✅ 모든 문장 정확히 배열!\n\n`;
  else if(!wrong.length&&!disp.length&&approved.length) t+=`✅ 이의신청 포함 전 문장 정답!\n\n`;
  t+=`─ SF English · Skeleton & Flesh ─`;
  navigator.clipboard?navigator.clipboard.writeText(t).then(()=>alert('복사 완료!\n카카오톡 등에 붙여넣기 하세요.')):
    (()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('복사되었습니다.');})();
}

            <div style="font-size:13px;font-weight:700;color:#1B3A5C">${st.title}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px"><span class="set-badge ${st.levelClass}">${st.level}</span> &nbsp;${st.questions.length}문제</div>
          </div>
          <label class="sw" title="${st.title}">
            <input type="checkbox" id="vis_${st.id}" ${isOn?'checked':''} onchange="toggleSet('${st.id}',this.checked)">
            <span class="sl"></span>
          </label>
        </div>`;
      }).join('')}
      <div style="margin-top:12px;background:#fffbeb;border-radius:8px;padding:10px;font-size:11px;color:#92400e;line-height:1.6">
        💡 스위치를 하나라도 켜면 켜진 세트만 학생에게 표시됩니다.<br>모두 끈 상태 = 전체 공개
      </div>
      <div id="visSaveMsg" style="text-align:center;font-size:12px;color:#16a34a;margin-top:8px;height:16px"></div>
    </div>

    <!-- 이의신청 검토 -->
    <div class="card" style="padding-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:12px">📋 이의신청 검토</div>
    </div>
    <div id="adminList"><div style="text-align:center;padding:24px;color:#888;font-size:13px">불러오는 중…</div></div>`;
  loadDisputes();
}

function setRate(v){
  sampleRate=v/100;
  const inp=document.getElementById('rateInput');
  if(inp)inp.value=v;
  document.querySelectorAll('.pgBtn').forEach(b=>{
    b.classList.toggle('on', parseInt(b.textContent)===v);
  });
  /* 미리보기 업데이트 */
  rAdmin(document.getElementById('app'));
}

function syncRateButtons(v){
  const n=parseInt(v);
  if(isNaN(n)||n<10||n>100)return;
  sampleRate=n/100;
  document.querySelectorAll('.pgBtn').forEach(b=>{
    b.classList.toggle('on', parseInt(b.textContent)===n);
  });
}

function saveRate(){
  const inp=document.getElementById('rateInput');
  const v=inp?parseInt(inp.value):Math.round(sampleRate*100);
  if(isNaN(v)||v<10||v>100){alert('10~100 사이 값을 입력하세요');return;}
  sampleRate=v/100;
  const msg=document.getElementById('rateSaveMsg');
  if(DB){
    DB.ref('structure_settings/sampleRate').set(sampleRate,()=>{
      if(msg){msg.textContent=`✅ 저장 완료 (${v}%)`;setTimeout(()=>{if(msg)msg.textContent='';},2500);}
    });
  } else {
    if(msg){msg.textContent=`✅ 저장됨 (Firebase 없음 — 세션 내 적용)`;setTimeout(()=>{if(msg)msg.textContent='';},2500);}
  }
}

function toggleSet(id, on){
  /* 현재 상태 복사 후 해당 세트 업데이트 */
  if(!visibleSets) visibleSets={};
  visibleSets[id]=on;
  /* 모두 false면 null로 저장 (전체 공개) */
  const anyOn=Object.values(visibleSets).some(v=>v===true);
  const toSave=anyOn?{...visibleSets}:null;
  const msg=document.getElementById('visSaveMsg');
  if(DB){
    DB.ref('structure_settings/visibleSets').set(toSave,()=>{
      if(msg){
        msg.textContent=toSave?`✅ 저장됨 — ${Object.values(toSave).filter(v=>v).length}개 세트 공개 중`:'✅ 저장됨 — 전체 공개';
        setTimeout(()=>{if(msg)msg.textContent='';},2500);
      }
    });
  } else {
    visibleSets=toSave||{};
    if(msg){msg.textContent='✅ 적용됨 (Firebase 없음)';setTimeout(()=>{if(msg)msg.textContent='';},2500);}
  }
}

function loadDisputes(){
  const el=document.getElementById('adminList');
  if(!el)return;
  if(!DB){el.innerHTML=`<div class="card" style="text-align:center;color:#888;font-size:13px">Firebase 연결 없음</div>`;return;}
  DB.ref('structure_disputes').once('value',snap=>{
    if(!el)return;
    const items=[];
    snap.forEach(ch=>{const v=ch.val();if(v.status==='pending')items.push({key:ch.key,...v});});
    if(!items.length){
      el.innerHTML=`<div class="card" style="text-align:center;color:#888;font-size:13px">📭 검토 대기 이의신청이 없습니다.</div>`;
      return;
    }
    el.innerHTML=items.map(item=>`
      <div class="admin-row" id="ar_${item.key.replace(/\W/g,'_')}">
        <div class="admin-meta">${item.name} &nbsp;·&nbsp; ${item.setTitle} &nbsp;·&nbsp; ${new Date(item.date).toLocaleDateString('ko-KR')}</div>
        <div class="admin-sent">${item.sentence}</div>
        <div class="admin-ans-box">
          <div class="admin-ans-lbl" style="color:#16a34a">✅ 정답 순서</div>
          <div class="admin-ans-val" style="color:#1B3A5C">${item.correctAnswer}</div>
          <div class="admin-ans-lbl mt8" style="color:#dc2626">❌ 학생 답안</div>
          <div class="admin-ans-val" style="color:#dc2626">${item.studentAnswer}</div>
        </div>
        <div class="admin-btn-row">
          <button class="btn bGreen" onclick="resolveDispute('${item.key}','approved')">✅ 정답 처리</button>
          <button class="btn br" onclick="resolveDispute('${item.key}','rejected')">❌ 오답 유지</button>
        </div>
      </div>`).join('');
  });
}

function resolveDispute(key,verdict){
  if(!DB)return;
  DB.ref(`structure_disputes/${key}`).update({status:verdict,resolvedAt:new Date().toISOString()});
  const el=document.getElementById('ar_'+key.replace(/\W/g,'_'));
  if(el){
    el.style.opacity='.4';
    el.querySelector('.admin-btn-row').innerHTML=`<div style="text-align:center;width:100%;font-weight:700;font-size:13px;padding:8px;color:${verdict==='approved'?'#16a34a':'#dc2626'}">${verdict==='approved'?'✅ 정답 처리 완료':'❌ 오답 유지 처리 완료'}</div>`;
  }
}

/* ════════════════════════════════════════════════════════════
   액션
   ════════════════════════════════════════════════════════════ */
function login(){const e=document.getElementById('nameInput'),n=e?e.value.trim():'';if(!n){alert('이름을 입력해주세요');return;}S.name=n;S.sc='select';R();}
function logout(){S.name='';S.sc='login';R();}
function setMode(m){S.mode=m;R();}

function startQuiz(id){
  const f=SETS.find(s=>s.id===id);if(!f)return;
  S.set=f;S.qi=0;S.score=0;S.results=[];S.sc='quiz';

  /* 테스트 모드: 출제 비율에 따라 문제 샘플링 */
  if(S.mode==='test'){
    const all=f.questions;
    const count=Math.max(1,Math.round(all.length*sampleRate));
    S.testQuestions=shuffle([...all]).slice(0,count);
  } else {
    S.testQuestions=null; /* 학습 모드는 전체 순서대로 */
  }

  initQ();R();
}
/* 현재 문제 반환 (테스트: 샘플링 배열 / 학습: 원본 배열) */
function curQ(){return S.testQuestions?S.testQuestions[S.qi]:S.set.questions[S.qi];}
function totQ(){return S.testQuestions?S.testQuestions.length:S.set.questions.length;}

function initQ(){
  const q=curQ();
  S.bankOrder=shuffle(q.chunks.map((_,i)=>i));S.answerOrder=[];
  S.attempts=0;S.submitted=false;S.lastOk=false;S.showExpl=false;S.showNext=false;
  if(S.mode==='test')S.showLabels=false;
}

function clickBank(p){if(S.submitted)return;moveChunk('bank',p,'ans',S.answerOrder.length);}
function clickAns(p){if(S.submitted)return;moveChunk('ans',p,'bank',S.bankOrder.length);}
function resetChunks(){if(S.submitted)return;S.bankOrder=shuffle(curQ().chunks.map((_,i)=>i));S.answerOrder=[];R();}
function toggleLabels(v){S.showLabels=v;R();}
function showExpl(){S.showExpl=true;R();}

function submitAnswer(){
  const q=curQ();
  const correct=q.chunks.map((_,i)=>i);
  const isOk=JSON.stringify(S.answerOrder)===JSON.stringify(correct);
  S.attempts++;S.submitted=true;S.lastOk=isOk;S.showNext=false;
  const sa=S.answerOrder.map(ci=>q.chunks[ci]).join(' / ');
  const ca=q.chunks.join(' / ');
  if(isOk){
    const pts=S.mode==='study'?(S.attempts===1?2:1):2;
    S.score+=pts;
    S.results.push({qi:S.qi,correct:true,attempts:S.attempts,pts,disputed:false,studentAnswer:sa,correctAnswer:ca});
  } else if(S.mode==='test'||(S.mode==='study'&&S.attempts>=2)){
    S.results.push({qi:S.qi,correct:false,attempts:S.attempts,pts:0,disputed:false,studentAnswer:sa,correctAnswer:ca});
  }
  R();
  /* 1초 후 다음 버튼 표시 */
  setTimeout(()=>{if(S.submitted){S.showNext=true;R();}},1000);
}

function retryQ(){S.submitted=false;S.lastOk=false;S.showNext=false;R();}

function disputeQ(){
  const q=S.set.questions[S.qi];
  const r=S.results.find(x=>x.qi===S.qi);
  if(!r||r.disputed)return;
  r.disputed=true;
  if(DB){
    DB.ref(`structure_disputes/${sKey(S.name)}_${S.set.id}_q${S.qi}_${Date.now()}`).set({
      name:S.name,setId:S.set.id,setTitle:S.set.title,
      qi:S.qi,questionId:q.id,sentence:q.sentence,
      correctAnswer:q.chunks.join(' / '),studentAnswer:r.studentAnswer,
      status:'pending',date:new Date().toISOString()
    });
  }
  R();
}

function nextQ(){S.qi++;initQ();R();}
function finishQuiz(){
  if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}
  if(S.results.length<totQ()){
    const q=curQ();
    S.results.push({qi:S.qi,correct:S.lastOk,attempts:S.attempts,pts:0,disputed:false,
      studentAnswer:S.answerOrder.map(ci=>q.chunks[ci]).join(' / '),correctAnswer:q.chunks.join(' / ')});
  }
  S.sc='result';R();
}
function retakeSet(){if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}startQuiz(S.set.id);}
function backToSelect(){if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}S.sc='select';R();}

/* ════════════════════════════════════════════════════════════
   드래그 앤 드롭
   ════════════════════════════════════════════════════════════ */
const D={active:false,srcZone:null,srcPos:null,ci:null,ghost:null,touchEl:null};
function bindDrag(){
  const az=document.getElementById('ans-zone'),bz=document.getElementById('bank-zone');
  if(!az||!bz)return;
  document.querySelectorAll('.ck[draggable]').forEach(el=>{
    el.addEventListener('dragstart',onDS);el.addEventListener('dragend',onDE);
    el.addEventListener('dragover',onCDO);el.addEventListener('drop',onCD);
    el.addEventListener('touchstart',onTS,{passive:false});
  });
  az.addEventListener('dragover',e=>{e.preventDefault();az.classList.add('drag-over');});
  az.addEventListener('dragleave',e=>{if(!az.contains(e.relatedTarget))az.classList.remove('drag-over');});
  az.addEventListener('drop',onZD);
  bz.addEventListener('dragover',e=>{e.preventDefault();bz.classList.add('drag-over');});
  bz.addEventListener('dragleave',e=>{if(!bz.contains(e.relatedTarget))bz.classList.remove('drag-over');});
  bz.addEventListener('drop',onBD);
}
function onDS(e){const el=e.currentTarget;D.srcZone=el.dataset.zone;D.srcPos=+el.dataset.pos;D.ci=+el.dataset.ci;D.active=true;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(D.ci));setTimeout(()=>el.classList.add('dragging'),0);}
function onDE(){D.active=false;document.querySelectorAll('.ck.dragging,.drag-over,.drop-indicator').forEach(el=>{el.classList.remove('dragging','drag-over');if(el.classList.contains('drop-indicator'))el.remove();});}
function onCDO(e){e.preventDefault();e.stopPropagation();const t=e.currentTarget;if(t.dataset.zone!=='ans')return;document.querySelectorAll('.drop-indicator').forEach(el=>el.remove());const rect=t.getBoundingClientRect();const ind=document.createElement('div');ind.className='drop-indicator';if(e.clientX<rect.left+rect.width/2)t.parentNode.insertBefore(ind,t);else t.parentNode.insertBefore(ind,t.nextSibling);}
function onCD(e){e.preventDefault();e.stopPropagation();if(!D.active)return;const t=e.currentTarget;const rect=t.getBoundingClientRect();moveChunk(D.srcZone,D.srcPos,t.dataset.zone,e.clientX<rect.left+rect.width/2?+t.dataset.pos:+t.dataset.pos+1);}
function onZD(e){e.preventDefault();document.getElementById('ans-zone').classList.remove('drag-over');document.querySelectorAll('.drop-indicator').forEach(el=>el.remove());if(!D.active)return;moveChunk(D.srcZone,D.srcPos,'ans',S.answerOrder.length);}
function onBD(e){e.preventDefault();document.getElementById('bank-zone').classList.remove('drag-over');if(!D.active||D.srcZone==='bank')return;moveChunk(D.srcZone,D.srcPos,'bank',S.bankOrder.length);}
function onTS(e){const el=e.currentTarget;D.srcZone=el.dataset.zone;D.srcPos=+el.dataset.pos;D.ci=+el.dataset.ci;D.active=true;D.touchEl=el;const t=e.touches[0];const g=document.createElement('div');g.id='drag-ghost';g.textContent=el.textContent.trim();g.style.left=t.clientX+'px';g.style.top=t.clientY+'px';document.body.appendChild(g);D.ghost=g;el.classList.add('dragging');e.preventDefault();}
function onTM(e){if(!D.active||!D.ghost)return;e.preventDefault();const t=e.touches[0];D.ghost.style.left=t.clientX+'px';D.ghost.style.top=t.clientY+'px';D.ghost.style.display='none';const un=document.elementFromPoint(t.clientX,t.clientY);D.ghost.style.display='';document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));const z=un&&un.closest('#ans-zone,#bank-zone');if(z)z.classList.add('drag-over');}
function onTE(e){if(!D.active)return;const t=e.changedTouches[0];if(D.ghost)D.ghost.style.display='none';const un=document.elementFromPoint(t.clientX,t.clientY);if(D.ghost){D.ghost.remove();D.ghost=null;}if(D.touchEl)D.touchEl.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));if(!un){D.active=false;return;}const tc=un.closest('.ck[data-zone]');if(tc&&tc!==D.touchEl){const r=tc.getBoundingClientRect();moveChunk(D.srcZone,D.srcPos,tc.dataset.zone,t.clientX<r.left+r.width/2?+tc.dataset.pos:+tc.dataset.pos+1);D.active=false;return;}const tz=un.closest('#ans-zone')?'ans':un.closest('#bank-zone')?'bank':null;if(tz)moveChunk(D.srcZone,D.srcPos,tz,tz==='ans'?S.answerOrder.length:S.bankOrder.length);D.active=false;}
document.addEventListener('touchmove',onTM,{passive:false});
document.addEventListener('touchend',onTE,{passive:false});
function moveChunk(sz,sp,dz,dp){let ci;if(sz==='bank')ci=S.bankOrder.splice(sp,1)[0];else ci=S.answerOrder.splice(sp,1)[0];if(dz==='ans'){const adj=(sz==='ans'&&sp<dp)?dp-1:dp;S.answerOrder.splice(Math.max(0,Math.min(adj,S.answerOrder.length)),0,ci);}else{S.bankOrder.push(ci);}R();}

R();
</script>
