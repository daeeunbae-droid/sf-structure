          <div style="flex:1;height:2px;background:linear-gradient(90deg,${lineColor},${steps.findIndex(x=>x.id===mode)>i+1?steps[i+1].color+'22':'#94a3b8'});border-radius:2px;"></div>

  a.innerHTML=`
    <!-- 헤더 -->
    <div class="card">
      <div class="fb mb8">
        <div>
          <div class="brand" style="font-size:18px;text-align:left">📐 SF Structure</div>
          <div style="font-size:12px;color:#888">${S.name} 님</div>

        <div style="font-size:11px;color:#fff;background:${steps.find(s=>s.id===mode).color};border-radius:6px;padding:2px 8px;font-weight:700">${steps.find(s=>s.id===mode).label}</div>
      </div>

}

/* ── 3. 문제 풀이 ── */
function rQuiz(a){
  const q=curQ();
  const tot=totQ();
  const pct=Math.round((S.qi/tot)*100);
  const isTest=S.mode==='test';
  const isStudy=!isTest;
  const lblTop=(S.showLabels&&!S.submitted)?'margin-top:14px':'';

  function ckHtml(ci,zone,pos){
    const raw=q.chunks[ci], label=q.labels[ci];
    /* 뱅크: 첫 글자 소문자 (위치 힌트 제거) / 답안·제출 후: 원문 유지 */
    const text=(zone==='bank'&&!S.submitted)?lcFirst(raw):raw;
    const lbl=(S.showLabels&&!S.submitted&&label)?`<span class="ck-lbl ${lblCls(label)}">${displayLabel(label)}</span>`:'';
    let cls=zone==='bank'?'ck ck-bank':'ck ck-ans';
    if(S.submitted&&zone==='ans') cls=S.lastOk?'ck ck-ok':'ck ck-no';
    const drag=S.submitted?'':'draggable="true"';
    const clk=S.submitted?'':(zone==='bank'?`onclick="clickBank(${pos})"`:`onclick="clickAns(${pos})"`);
    return`<button type="button" class="${cls}" style="${lblTop}" data-zone="${zone}" data-pos="${pos}" data-ci="${ci}" ${drag} ${clk}>${lbl}${text}</button>`;
  }

  const bankHtml=S.bankOrder.length
    ?S.bankOrder.map((ci,bi)=>ckHtml(ci,'bank',bi)).join('')
    :`<span style="font-size:12px;color:#94a3b8;padding:8px">모든 조각을 놓았어요</span>`;
  const ansHtml=S.answerOrder.length
    ?S.answerOrder.map((ci,ai)=>ckHtml(ci,'ans',ai)).join('')
    :`<span class="zone-ph">여기에 조각을 놓아보세요</span>`;

  const hintRow=(isStudy&&!S.submitted)?`
    <div class="hint-row">
      <span class="hint-lbl">💡 라벨 힌트 보기</span>
      <label class="sw"><input type="checkbox" ${S.showLabels?'checked':''} onchange="toggleLabels(this.checked)"><span class="sl"></span></label>
    </div>`:'';

  /* ── 학습 모드 접근 힌트 ── */
  const approachHint=(isStudy&&q.concept)?`
    <div style="margin-bottom:12px;border-radius:10px;overflow:hidden;border:1.5px solid #e0e7ff">
      <div onclick="toggleHint()" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f5f3ff;cursor:pointer;user-select:none">
        <span style="font-size:11px;font-weight:800;color:#6d28d9;letter-spacing:.3px">💭 어떻게 접근할까?</span>
        <span style="font-size:13px;color:#a78bfa;font-weight:700">${S.hintCollapsed?'▸ 펼치기':'▾ 접기'}</span>
      </div>
      ${S.hintCollapsed?'':
        `<div style="padding:9px 12px;background:#faf5ff;font-size:12px;color:#4c1d95;line-height:1.7;font-weight:500">
          ${conceptToHint(q.concept)}
        </div>`}
    </div>`
  :'';

  const allPlaced=S.bankOrder.length===0;
  const btnRow=!S.submitted?`
    <div class="btn-row">
      <button type="button" class="btn bGray" style="flex:1" onclick="resetChunks()">초기화</button>
      <button type="button" class="btn bn" style="flex:2" onclick="submitAnswer()" ${allPlaced?'':'disabled'}>
        ${allPlaced?'제출 →':`남은 조각: ${S.bankOrder.length}개`}
      </button>
    </div>`:'';

  let fb='';
  if(S.submitted){
    const isLast=S.qi+1>=tot;
    const curR=S.results.find(r=>r.qi===S.qi);
    /* 1초 딜레이 후에만 다음 버튼 표시 */
    const nextBtn=S.showNext
      ?`<button type="button" class="btn ${isLast?'bg':'bn'} mt12" onclick="${isLast?'finishQuiz()':'nextQ()'}">
          ${isLast?'결과 보기 🏁':'다음 문제 →'}</button>`
      :`<div style="font-size:11px;color:#94a3b8;text-align:center;margin-top:12px;padding:4px">잠시 후 다음 버튼이 나타납니다...</div>`;

    if(S.lastOk){
      /* 정답 */
      const pts=curR?curR.pts:0;
      fb=`<div class="fdb ok">✅ 정답! &nbsp;<span style="font-size:13px">${pts}점 획득</span></div>`;
      if(isStudy){
        if(!S.showExpl) fb+=`<button type="button" class="btn bGray mt8" style="font-size:13px" onclick="showExpl()">📖 설명 보기</button>`;
        else fb+=`<div class="expl-box mt8"><div class="expl-ttl"><span class="pattern-badge">${q.pattern}</span><span class="concept-tag">${q.concept}</span></div><div style="margin-top:8px">${q.explanation}</div></div>`;
      }
      /* 연계 문법 문제 */
      if(isStudy && q.linkedGrammar) fb+=linkedGrammarUI(q.linkedGrammar, q.linkedGrammar.tp||'');
      fb+=nextBtn;
    } else {
      /* 오답 — 즉시 정답 표시 */
      const caHtml=q.chunks.map(c=>`<span class="ca-ck">${c}</span>`).join('');
      fb=`<div class="fdb no">❌ 오답</div>
        <div class="ca-box"><div class="ca-lbl">정답 순서</div><div class="ca-chunks">${caHtml}</div></div>`;

      /* 학습 모드 + 1차 오답 → 다시 시도 버튼 (정답 보여주고 위에 있음) */
      if(isStudy&&S.attempts<2){
        fb+=`<div class="btn-row mt8"><button type="button" class="btn bn" onclick="retryQ()">다시 시도 (1회 남음)</button></div>`;
        /* 다시 시도 중에는 이의신청/설명/다음 버튼 없음 */
      } else {
        /* 테스트 모드 또는 학습 2회 소진 → 이의신청 + (설명) + 다음 */
        const isDisp=curR&&curR.disputed;
        if(!isDisp) fb+=`<button type="button" class="btn bYellow mt8" style="font-size:13px" onclick="disputeQ()">📋 내 답도 맞아요</button>`;
        else fb+=`<div class="fdb disp mt8">📋 검토 대기 중 — 선생님이 확인합니다</div>`;

        if(isStudy){
          if(!S.showExpl) fb+=`<button type="button" class="btn bGray mt8" style="font-size:13px" onclick="showExpl()">📖 설명 보기</button>`;
          else fb+=`<div class="expl-box mt8"><div class="expl-ttl"><span class="pattern-badge">${q.pattern}</span><span class="concept-tag">${q.concept}</span></div><div style="margin-top:8px">${q.explanation}</div></div>`;
        }
        /* 연계 문법 문제 */
        if(isStudy && q.linkedGrammar) fb+=linkedGrammarUI(q.linkedGrammar, q.linkedGrammar.tp||'');
        fb+=nextBtn;
      }
    }
  }

  a.innerHTML=`
    <div class="card">
      <div class="quiz-header">
        <span class="q-num">문제 ${S.qi+1} / ${tot}</span>
        ${isTest
          ?`<div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:10px;font-weight:800;color:#fff;background:#B45309;border-radius:6px;padding:2px 8px;letter-spacing:.3px">확인하기</span>
              <span class="q-score">점수: ${S.score} / ${S.qi*2}점</span>
            </div>`
          :S.mode==='drill'
            ?`<span class="q-mode">🦴 구조 훈련</span>`
            :`<span class="q-mode">📖 학습 모드</span>`}
      </div>
      <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
      ${approachHint}
      ${hintRow}
      <div class="zone-lbl">내 답안</div>
      <div class="answer-zone ${S.answerOrder.length===0?'empty':''}" id="ans-zone" style="${S.showLabels&&!S.submitted?'padding-top:8px':''}">${ansHtml}</div>
      <div class="zone-lbl">문장 조각</div>
      <div class="bank-zone" id="bank-zone">${bankHtml}</div>
      ${btnRow}
      ${fb}
    </div>
    <button type="button" class="btn bGray" style="margin-top:0" onclick="backToSelect()">← 세트 선택으로</button>`;

  if(!S.submitted) bindDrag();
}

/* ── 4. 결과 ── */
function rResult(a){
  /* 이전 dispute 리스너 정리 */
  if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}

  const tot=totQ(), maxPt=tot*2;
  const pct=maxPt?Math.round((S.score/maxPt)*100):0;
  const isTest=S.mode==='test';
  const dispCount=S.results.filter(r=>r.disputed).length;
  const qList=S.testQuestions||S.set.questions;  /* 출제된 문제 배열 */

  if(isTest&&DB){
    const allCount=S.set.questions.length;
    DB.ref(`structure_results/${sKey(S.name)}/${S.set.id}_${Date.now()}`).set({
      name:S.name,setId:S.set.id,setTitle:S.set.title,
      score:S.score,maxScore:maxPt,pct,
      sampleRate,sampledCount:tot,totalCount:allCount,
      date:new Date().toISOString()
    });
  }

  const rows=S.results.map((r,i)=>{
    const q=qList[i];
    const isWrong=r.pts===0&&!r.disputed&&!r.approved;
    let tag=r.disputed?`<span class="res-tag res-disp">📋 검토중</span>`:
      r.approved?`<span class="res-tag res-ok">✅ 정답처리</span>`:
      r.pts>0?`<span class="res-tag res-ok">${r.pts===2?'✓ 2점':'✓ 1점'}</span>`:
      `<span class="res-tag res-no">✗ 0점</span>`;

    const wrongDetail=isWrong?`
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #fee2e2">
        <div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:5px">✅ 정답 순서</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
          ${q.chunks.map(ck=>`<span style="display:inline-block;padding:4px 9px;border-radius:6px;background:#f0fdf4;border:1px solid #86efac;font-size:12px;font-weight:600;color:#166534">${ck}</span>`).join('')}
        </div>
        ${r.studentAnswer?`
        <div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:4px">❌ 내 답안</div>
        <div style="font-size:12px;color:#dc2626;margin-bottom:8px;line-height:1.6">${r.studentAnswer}</div>`:''}
        ${q.explanation?`
        <details>
          <summary style="font-size:11px;font-weight:700;color:#1d4ed8;cursor:pointer;user-select:none;padding:4px 0">📖 구조 설명 보기</summary>
          <div style="font-size:12px;color:#1e40af;background:#eff6ff;border-radius:8px;padding:10px;margin-top:6px;line-height:1.75">${q.explanation}</div>
        </details>`:''}
      </div>`:'';

    return`<div style="padding:10px 0;border-bottom:1px solid #f1f5f9">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <span style="font-size:11px;font-weight:700;color:#94a3b8;flex-shrink:0;width:20px;margin-top:2px">${i+1}</span>
        <span class="res-sent" style="flex:1">${q.sentence}</span>
        ${isTest?tag:''}
      </div>
      ${wrongDetail}
    </div>`;
  }).join('');

  const totalCount=S.set.questions.length;
  const sampledInfo=isTest&&tot<totalCount
    ?`<div style="font-size:12px;color:#64748b;margin-top:4px">전체 ${totalCount}문항 중 ${tot}문항 출제 (${Math.round(sampleRate*100)}%)</div>`
    :'';

  a.innerHTML=`
    <div class="card" style="text-align:center">
      <div class="em">${pctEmoji(pct)}</div>
      <div style="font-size:12px;color:#888;margin-bottom:2px">${S.name} · ${S.set.title}</div>
      ${sampledInfo}
      ${isTest?`
        <div class="rs-score" style="margin-top:8px">${S.score}<span> / ${maxPt}점</span></div>
        <div class="rs-pct" style="color:${pctColor(pct)}">${pct}%${dispCount?` (검토 ${dispCount}건)`:''}</div>
        <div class="pb mt8"><div style="height:100%;width:${pct}%;background:${pctColor(pct)};border-radius:99px;transition:width .6s"></div></div>
      `:`<div style="font-size:18px;font-weight:800;color:#1B3A5C;margin:8px 0">학습 완료!</div>
        <div style="font-size:13px;color:#64748b">총 ${tot}문장 구조 복원 훈련</div>`}
    </div>
    ${dispCount?`<div style="font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;margin-bottom:14px">📋 이의신청 ${dispCount}건 — 선생님이 확인 후 처리합니다.</div>`:''}
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:10px">📋 문장별 결과</div>
      ${rows}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;padding-bottom:20px">
      ${isTest?`<button type="button" class="btn bGray" onclick="copyResult()">📋 결과 복사 (학부모 전달용)</button>`:''}
      ${S.results.some(r=>r.pts===0&&!r.disputed&&!r.approved)?`<button type="button" class="btn br" onclick="retakeWrong()">🔁 틀린 문장만 다시 풀기</button>`:''}
      <button type="button" class="btn bn" onclick="retakeSet()">같은 세트 다시 풀기</button>
      <button type="button" class="btn bo" onclick="backToSelect()">← 세트 선택으로</button>
    </div>`;

  /* ── 이의신청 실시간 리스너 ── */
  if(isTest && dispCount>0 && DB){
    const ref=DB.ref('structure_disputes');
    window._sfDisputeRef=ref;
    ref.on('value',snap=>{
      let changed=false;
      snap.forEach(ch=>{
        const v=ch.val();
        if(v.name!==S.name||v.setId!==S.set.id)return;
        if(v.status==='approved'){
          const r=S.results.find(x=>x.qi===v.qi&&x.disputed);
          if(r){r.disputed=false;r.approved=true;r.pts=1;r.correct=true;S.score+=1;changed=true;}
        }else if(v.status==='rejected'){
          const r=S.results.find(x=>x.qi===v.qi&&x.disputed);
          if(r){r.disputed=false;r.approved=false;changed=true;}
        }
      });
      if(changed)R();
    });
  }
}

/* 결과 복사 */
function copyResult(){
  const qList=S.testQuestions||S.set.questions;
  const tot=totQ(), maxPt=tot*2;
  const pct=maxPt?Math.round((S.score/maxPt)*100):0;
  const pairs=S.results.map((r,i)=>({r,q:qList[i]}));
  const wrong   = pairs.filter(x=>x.r.pts===0&&!x.r.disputed&&!x.r.approved);
  const disp    = pairs.filter(x=>x.r.disputed);
  const approved= pairs.filter(x=>x.r.approved);
  let t=`[SF English Structure 결과]\n학생: ${S.name}\n날짜: ${todayStr()}\n세트: ${S.set.title}\n점수: ${S.score} / ${maxPt}점 (${pct}%)\n\n`;
  if(approved.length){t+=`■ ✅ 정답 처리됨 (이의신청 승인 ${approved.length}개)\n`;approved.forEach(({q},i)=>{t+=`${i+1}. ${q.sentence}\n`;});t+='\n';}
  if(wrong.length){t+=`■ 틀린 문장 (${wrong.length}개)\n`;wrong.forEach(({q},i)=>{t+=`${i+1}. ${q.sentence}\n`;});t+='\n';}
  if(disp.length){t+=`■ 이의신청 검토 중 (${disp.length}개)\n`;disp.forEach(({q},i)=>{t+=`${i+1}. ${q.sentence}\n`;});t+='\n';}
  if(!wrong.length&&!disp.length&&!approved.length) t+=`✅ 모든 문장 정확히 완성!\n\n`;
  else if(!wrong.length&&!disp.length&&approved.length) t+=`✅ 이의신청 포함 전 문장 정답!\n\n`;
  t+=`─ SF English · Skeleton & Flesh ─`;
  navigator.clipboard?navigator.clipboard.writeText(t).then(()=>alert('복사 완료!\n카카오톡 등에 붙여넣기 하세요.')):
    (()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('복사되었습니다.');})();
}

/* 청크 역할 분류 → CSS 클래스 */
function chunkRoleClass(label){
  if(!label) return '';
  const S_LABELS=['S','GS','RS','가S','실S','진S'];
  const V_LABELS=['V','V1','V2','V3'];
  const OC_LABELS=['O','C','IO','DO','OC','OC(Inf)','OC(that절)'];
  const MOD_LABELS2=['Mod','Adv.Cl','Rel.Cl','Inf','Adv','AdvCl','Comp'];
  if(S_LABELS.includes(label)) return 'role-s';
  if(V_LABELS.includes(label)) return 'role-v';
  if(OC_LABELS.some(l=>label===l||label.startsWith('OC('))) return 'role-oc';
  if(MOD_LABELS2.includes(label)) return 'role-mod';
  return '';
}

/* 뼈대 가이드 바 — 현재 답안에 이미 채워진 라벨 기준으로 활성화 */
function buildSkeletonBar(answerOrder, chunks, chunkStates){
  /* 답안에 놓인 청크들의 라벨 수집 */
  const placedLabels=new Set();
  answerOrder.forEach(ci=>{
    const c=chunks[ci]; if(!c) return;
    const st=chunkStates[c.id]||'active';
    if(st==='hidden') return;
    placedLabels.add(c.label);
  });
  const hasS=chunks.some(c=>['S','GS','RS','가S','실S','진S'].includes(c.label)&&placedLabels.has(c.label));
  const hasV=chunks.some(c=>['V','V1','V2','V3'].includes(c.label)&&placedLabels.has(c.label));
  const hasOC=chunks.some(c=>['O','C','IO','DO','OC'].some(l=>c.label===l||c.label.startsWith('OC('))&&placedLabels.has(c.label));
  /* 다음 채워야 할 슬롯 결정 */
  let activeSlot= !hasS?'s': !hasV?'v': !hasOC?'oc':'mod';
  const slot=(id,cls,label,emoji)=>{
    const done= id==='s'?hasS: id==='v'?hasV: id==='oc'?hasOC:false;
    const active= id===activeSlot && !done;
    return`<span class="sk-slot ${cls}${done?' sk-done':active?' sk-active':''}">${emoji} ${label}</span>`;
  };
  return`<div class="skeleton-bar">
    ${slot('s','sk-s','주어','🔵')}
    <span class="sk-arrow">→</span>
    ${slot('v','sk-v','동사','🔴')}
    <span class="sk-arrow">→</span>
    ${slot('oc','sk-oc','핵심 자리','🟢')}
    <span class="sk-arrow">→</span>
    <span class="sk-slot sk-mod">🟡 수식어</span>
  </div>`;
}

function rDrillResult(a){
  const total=S.drillResults.length;
  const correct=S.drillResults.filter(r=>r.correct).length;
  const pct=total?Math.round((correct/total)*100):0;

  /* primaryFocus별 집계 */
  const focusMap={};
  S.drillResults.forEach(r=>{
    const f=r.primaryFocus||'SV';
    if(!focusMap[f]) focusMap[f]={total:0,correct:0};
    focusMap[f].total++;
    if(r.correct) focusMap[f].correct++;
  });

  const focusRows=Object.entries(focusMap).map(([f,v])=>{
    const ok=v.correct===v.total;
    const pf=Math.round((v.correct/v.total)*100);
    return`<div style="padding:10px 0;border-bottom:1px solid #f1f5f9">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

      </div>
      <div style="height:4px;background:#e2e8f0;border-radius:2px">
        <div style="height:4px;background:${ok?'#16a34a':'#E8A010'};border-radius:2px;width:${pf}%"></div>
      </div>
    </div>`;
  }).join('');

  /* 약점 drill 추천 */
  const weak=S.drillResults.filter(r=>!r.correct);
  const weakDrills=[...new Set(weak.map(r=>r.drill))];
  const weakSection=weakDrills.length?`
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:#dc2626;margin-bottom:8px">💡 약점 훈련 추천</div>
      ${weakDrills.map(d=>`<div style="font-size:12px;color:#64748b;padding:6px 0;display:flex;align-items:center;gap:6px">
        <span style="font-size:16px">→</span>
        <span>${drillLabel(d)}</span>
      </div>`).join('')}
    </div>`:'';

  a.innerHTML=`
    <div style="padding:20px 0">
      <div class="card" style="text-align:center">
        <div style="font-size:32px;margin-bottom:8px">${pct>=90?'🏆':pct>=70?'⭐':'📚'}</div>
        <div style="font-size:20px;font-weight:800;color:#1B3A5C;margin-bottom:4px">훈련 완료</div>
        <div style="font-size:36px;font-weight:900;color:${pctColor(pct)}">${pct}%</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:8px">${total}문제 중 ${correct}문제 정답</div>
        <div style="font-size:12px;color:${pctColor(pct)};font-weight:600">
          ${pct>=90?'완벽합니다! 다음 세트로 넘어가세요.':pct>=70?'잘 하고 있어요. 틀린 문장을 한 번 더 확인하세요.':'약점이 발견됐어요. 아래 추천 훈련을 진행하세요.'}
        </div>
      </div>
      <div class="card">
        <div style="font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:8px">📊 구조별 결과</div>
        ${focusRows}
      </div>
      ${weakSection}
      <div class="card">

        <button type="button" class="btn bGray" onclick="backDrillToSelect()">← 세트 선택으로</button>

/* ── drill 액션 함수들 ── */
function drillSelectChunk(cid){
  if(S.submitted) return;
  const stepData=S.currentDrillQ.steps[S.currentStep];
  const multi=stepData.selectionType==='multiple';
  if(multi){
    const idx=S.selectedChunks.indexOf(cid);
    if(idx>=0) S.selectedChunks.splice(idx,1);
    else S.selectedChunks.push(cid);
  } else {
    S.selectedChunks=S.selectedChunks.includes(cid)?[]:[cid];
  }
  R();
}

function submitDrill(){
  if(S.submitted) return;
  const stepData=S.currentDrillQ.steps[S.currentStep];
  S.lastOk=gradeDrillStep(stepData);
  S.submitted=true;

  /* step 결과 저장 */
  S.stepResults.push({
    stepId:stepData.stepId,
    task:stepData.task,
    correct:S.lastOk,
    selectedIds:[...S.selectedChunks],
    userOrder:[...S.answerOrder],
    correctOrder:stepData.answer.order,
    drill:S.currentDrillQ.drill,
    primaryFocus:S.currentDrillQ.primaryFocus
  });

  /* 마지막 step이면 문항 결과 저장 + Firebase 로그 */
  const isLastStep=S.currentStep>=S.totalSteps-1;
  if(isLastStep){
    const allCorrect=S.stepResults.every(r=>r.correct);
    S.drillResults.push({
      questionId:S.currentDrillQ.questionId,
      correct:allCorrect,
      drill:S.currentDrillQ.drill,
      primaryFocus:S.currentDrillQ.primaryFocus
    });

    /* Firebase 로그 저장 — 문항 단위 1회 */
    if(DB && S.name && S.set){
      const dq=S.currentDrillQ;
      const srcQ=S.set.questions.find(q=>q.id===dq.sourceSentenceId)||{};
      const userAnswerTexts=S.answerOrder.map(ci=>{
        const c=stepData.chunks[ci];
        return c?c.text:'';
      }).filter(Boolean);
      const correctAnswerTexts=stepData.answer.order.map(cid=>{
        const c=stepData.chunks.find(x=>x.id===cid);
        return c?c.text:'';
      }).filter(Boolean);

      try{
        DB.ref('structure_logs/'+sKey(S.name)).push().set({
          name:         S.name,
          timestamp:    Date.now(),
          setId:        S.set.id,
          setTitle:     S.set.title,
          questionId:   dq.sourceSentenceId,
          correct:      allCorrect,
          primaryFocus: dq.primaryFocus||null,
          drill:        dq.drill||null,
          exam:         (DRILL_TO_TEST[dq.drill]||{}).exam||null,
          trap:         (DRILL_TO_TEST[dq.drill]||{}).trap||null,
          errorMsg:     DRILL_TO_ERROR_MSG[dq.drill]||null,
          userAnswer:   userAnswerTexts,
          correctAnswer:correctAnswerTexts
        });
      }catch(e){ /* Firebase 에러 무시 — 앱 동작에 영향 없음 */ }
    }
  }
  R();
}

function gradeDrillStep(stepData){
  if(stepData.task==='select') return checkDrillSelect(stepData);
  return checkDrillArrange(stepData);
}

function checkDrillArrange(stepData){
  /* answerOrder는 stepData.chunks의 인덱스 배열 → chunk id 순서로 변환 */
  /* hidden/locked 중 locked만 포함 (hidden은 제거된 수식어) */
  const userOrderIds=S.answerOrder.map(ci=>{
    const c=stepData.chunks[ci];
    if(!c) return null;
    if(S.chunkStates[c.id]==='hidden') return null; /* 제거된 수식어 제외 */
    return c.id;
  }).filter(Boolean);
  return JSON.stringify(userOrderIds)===JSON.stringify(stepData.answer.order);
}

function checkDrillSelect(stepData){
  const correct=new Set(stepData.answer.order);
  const user=new Set(S.selectedChunks);
  if(correct.size!==user.size) return false;
  for(let id of correct){ if(!user.has(id)) return false; }
  return true;
}

function advanceDrillStep(){
  const stepData=S.currentDrillQ.steps[S.currentStep];
  if(stepData.task==='select'){
    const effect=stepData.selectEffect||'lock';
    /* 오답이어도 정답 기준으로 상태 전달 — 잘못 선택한 청크로 다음 step이 망가지지 않도록 */
    const correctIds=stepData.answer.order;
    if(effect==='remove') S.removedChunks=[...correctIds];
    else                   S.lockedChunks=[...correctIds];
  }
  if(stepData.task==='remove') S.removedChunks=[...stepData.answer.order];
  S.currentStep++;
  S.selectedChunks=[];
  initDrillStep();R();
}

function nextDrillQ(){
  S.drillQi++;
  initDrillQ();R();
}

function finishDrill(){
  /* ── 드릴 세션 완료 기록 → Firebase ── */
  if(DB && S.name && S.set && S.drillResults.length){
    const total=S.drillResults.length;
    const correct=S.drillResults.filter(r=>r.correct).length;
    const pct=Math.round(correct/total*100);
    const focusBreakdown={};
    S.drillResults.forEach(r=>{
      const f=r.primaryFocus||'SV';
      if(!focusBreakdown[f]) focusBreakdown[f]={total:0,correct:0};
      focusBreakdown[f].total++;
      if(r.correct) focusBreakdown[f].correct++;
    });
    try{
      DB.ref('structure_drill_sessions/'+sKey(S.name)+'/'+S.set.id+'_'+Date.now()).set({
        name:S.name, setId:S.set.id, setTitle:S.set.title,
        timestamp:Date.now(), date:new Date().toISOString(),
        total, correct, pct, focusBreakdown
      });
    }catch(e){}
  }
  S.sc='drill_result';R();
}

function drillReset(){
  if(S.submitted) return;
  initDrillStep();R();
}

function retakeDrill(){
  startDrill(S.set.id);
}

function retakeDrillWeak(){
  const weakIds=new Set(S.drillResults.filter(r=>!r.correct).map(r=>r.questionId.replace('_drill','')));
  S.drillQuestions=S.drillQuestions.filter(dq=>weakIds.has(dq.sourceSentenceId));
  S.drillQi=0;S.drillResults=[];S.sc='drill';
  initDrillQ();R();
}

function backDrillToSelect(){
  S.drillMode=false;S.currentDrillQ=null;S.sc='select';R();
}

/* ── 학생 목록 로드 ── */
function loadStudentList(){
  const el=document.getElementById('studentList');
  if(!el) return;
  if(!DB){el.innerHTML=`<div style="font-size:12px;color:#888;text-align:center">Firebase 연결 없음</div>`;return;}

  /* structure_results(테스트) + structure_logs(훈련) 두 경로에서 학생 이름 수집 */
  let resultsSnap=null, logsSnap=null, drillSessSnap=null;
  function tryRender(){
    if(!resultsSnap||!logsSnap||!drillSessSnap) return;
    /* 학생별 집계: { name, lastTs, testSessions, drillSessions } */
    const map={};
    resultsSnap.forEach(studentNode=>{
      const name=studentNode.val()&&Object.values(studentNode.val())[0]&&Object.values(studentNode.val())[0].name||studentNode.key;
      if(!map[studentNode.key]) map[studentNode.key]={name,lastTs:0,testSessions:0,drillSessions:0};
      studentNode.forEach(session=>{
        const v=session.val();
        if(v.date) map[studentNode.key].lastTs=Math.max(map[studentNode.key].lastTs,new Date(v.date).getTime());
        map[studentNode.key].testSessions++;
      });
    });
    logsSnap.forEach(studentNode=>{
      if(!map[studentNode.key]) map[studentNode.key]={name:studentNode.key,lastTs:0,testSessions:0,drillSessions:0};
      studentNode.forEach(entry=>{
        const v=entry.val();
        if(v.timestamp) map[studentNode.key].lastTs=Math.max(map[studentNode.key].lastTs,v.timestamp);
        if(v.name) map[studentNode.key].name=v.name;
      });
    });
    drillSessSnap.forEach(studentNode=>{
      if(!map[studentNode.key]) map[studentNode.key]={name:studentNode.key,lastTs:0,testSessions:0,drillSessions:0};
      studentNode.forEach(sess=>{
        const v=sess.val();
        if(v.timestamp) map[studentNode.key].lastTs=Math.max(map[studentNode.key].lastTs,v.timestamp);
        if(v.name) map[studentNode.key].name=v.name;
        map[studentNode.key].drillSessions++;
      });
    });

    const students=Object.entries(map).sort((a,b)=>b[1].lastTs-a[1].lastTs);
    if(!students.length){
      el.innerHTML=`<div style="font-size:12px;color:#94a3b8;text-align:center;padding:12px">아직 기록된 학생이 없어요.</div>`;
      return;
    }
    el.innerHTML=students.map(([key,d])=>{
      const dateStr=d.lastTs?new Date(d.lastTs).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}):'기록없음';
      return`<div onclick="openStudentDetail('${key}')" style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f1f5f9;cursor:pointer">
        <div>
          <div style="font-size:14px;font-weight:700;color:#1B3A5C">${d.name}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px">
            마지막 접속 ${dateStr}
            ${d.testSessions?` &nbsp;·&nbsp; 확인하기 ${d.testSessions}회`:''}
            ${d.drillSessions?` &nbsp;·&nbsp; 연습하기 ${d.drillSessions}회`:''}
          </div>
        </div>
        <span style="font-size:18px;color:#cbd5e1">›</span>
      </div>`;
    }).join('');
  }

  DB.ref('structure_results').once('value',snap=>{resultsSnap=snap;tryRender();});
  DB.ref('structure_logs').once('value',snap=>{logsSnap=snap;tryRender();});
  DB.ref('structure_drill_sessions').once('value',snap=>{drillSessSnap=snap;tryRender();});
}

      const title=(t||d).setTitle||sid;
      setProgress.push({sid,title,t,d,latestTs});

      /* 연습하기 셀 */

        drillCell=`<div style="text-align:center">
          <div style="font-size:14px;font-weight:800;color:${col}">${d.pct}%</div>
          <div style="font-size:10px;color:#94a3b8">${d.correct}/${d.total} &nbsp;${dateStr}</div>
        </div>`;
      } else {
        drillCell=`<div style="text-align:center;font-size:12px;color:#cbd5e1">-</div>`;
      }
      /* 확인하기 셀 */
      let testCell;
      if(t){
        const col=t.pct>=80?'#16a34a':t.pct>=60?'#E8A010':'#dc2626';
        const dateStr=new Date(t.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
        testCell=`<div style="text-align:center">
          <div style="font-size:14px;font-weight:800;color:${col}">${t.pct}%</div>
          <div style="font-size:10px;color:#94a3b8">${t.score}/${t.maxScore}점 &nbsp;${dateStr}</div>
        </div>`;
      } else {
        testCell=`<div style="text-align:center;font-size:12px;color:#cbd5e1">-</div>`;
      }
      return`<div style="display:grid;grid-template-columns:1fr 80px 80px;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;gap:6px">
        <div style="font-size:12px;font-weight:600;color:#1e293b;line-height:1.4">${title}</div>
        ${drillCell}
        ${testCell}
      </div>`;
    }).join('');

    const progressTable = setProgress.length ? `
      <div style="display:grid;grid-template-columns:1fr 80px 80px;gap:6px;padding:0 0 8px;border-bottom:2px solid #e2e8f0;margin-bottom:2px">
        <div style="font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.5px">세트</div>
        <div style="font-size:10px;font-weight:800;color:#0891b2;letter-spacing:.5px;text-align:center">🦴 연습하기</div>
        <div style="font-size:10px;font-weight:800;color:#1B3A5C;letter-spacing:.5px;text-align:center">✅ 확인하기</div>
      </div>
      ${progressRows}` :
      `<div style="font-size:12px;color:#94a3b8">아직 기록이 없어요.</div>`;

    /* ⑤ primaryFocus별 오답 패턴 (훈련 로그 기준) */
    const pfMap={};
    logsSnap.forEach(e=>{
      const v=e.val();
      const pf=v.primaryFocus||'(미분류)';
      if(!pfMap[pf]) pfMap[pf]={total:0,correct:0};
      pfMap[pf].total++;
      if(v.correct) pfMap[pf].correct++;
    });
    const PF_COLOR={SV:'#1B3A5C',MOD:'#0891b2',CLAUSE:'#7c3aed',MOVE:'#dc2626',OC:'#16a34a',VERB_FORM:'#E8A010'};
    const pfRows=Object.entries(pfMap).sort((a,b)=>(a[1].correct/a[1].total)-(b[1].correct/b[1].total)).map(([pf,v])=>{
      const pct=Math.round(v.correct/v.total*100);
      const color=pct>=80?'#16a34a':pct>=60?'#E8A010':'#dc2626';
      const barColor=PF_COLOR[pf]||'#64748b';
      return`<div style="padding:8px 0;border-bottom:1px solid #f1f5f9">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:700;color:#1e293b">${focusLabel(pf)}</span>
          <span style="font-size:12px;font-weight:700;color:${color}">${v.correct}/${v.total} (${pct}%)</span>
        </div>
        <div style="height:5px;background:#e2e8f0;border-radius:3px">
          <div style="height:5px;background:${barColor};border-radius:3px;width:${pct}%"></div>
        </div>
      </div>`;
    }).join('');

    /* ⑥ 틀린 문장 목록 (훈련 로그 기준) */
    const wrongList=[];
    logsSnap.forEach(e=>{
      const v=e.val();
      if(!v.correct){
        const q=SETS.flatMap(s=>s.questions).find(q=>q.id===v.questionId);
        wrongList.push({sentence:q?q.sentence:v.questionId, setTitle:v.setTitle, ts:v.timestamp, drill:v.drill, errorMsg:v.errorMsg||null});
      }
    });
    wrongList.sort((a,b)=>b.ts-a.ts);
    const wrongRows=wrongList.length
      ? wrongList.map(w=>`<div style="padding:8px 0;border-bottom:1px solid #f1f5f9">
          <div style="font-size:12px;color:#1e293b;line-height:1.5;font-weight:600">${w.sentence}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px">${w.setTitle} &nbsp;·&nbsp; ${new Date(w.ts).toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</div>
          ${w.errorMsg?`<div style="font-size:11px;color:#92400e;background:#fffbeb;border-radius:5px;padding:4px 8px;margin-top:4px">${w.errorMsg}</div>`:''}
        </div>`).join('')
      : `<div style="font-size:12px;color:#94a3b8;padding:8px 0">틀린 훈련 기록이 없어요.</div>`;

    el.innerHTML=`
      <div class="card">
        <div style="font-size:18px;font-weight:800;color:#1B3A5C;margin-bottom:4px">👤 ${studentName}</div>
        <div style="font-size:12px;color:#94a3b8">마지막 접속: ${lastStr}</div>
      </div>

      <div class="card">
        <div style="font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:12px">📋 세트별 학습 현황</div>
        ${progressTable}
      </div>

      <div class="card">
        <div style="font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:10px">🦴 구조 유형별 오답 패턴</div>
        ${pfRows||`<div style="font-size:12px;color:#94a3b8">훈련 기록이 없어요.</div>`}
      </div>

      <div class="card">
        <div style="font-size:13px;font-weight:700;color:#1B3A5C;margin-bottom:10px">❌ 틀린 문장 목록 (훈련 기준, 최신순)</div>
        ${wrongRows}
      </div>`;
  }

  DB.ref('structure_results/'+key).once('value',snap=>{resultsSnap=snap;renderDetail();});
  DB.ref('structure_logs/'+key).once('value',snap=>{logsSnap=snap;renderDetail();});
  DB.ref('structure_drill_sessions/'+key).once('value',snap=>{drillSessionsSnap=snap;renderDetail();});
}


function loadDisputes(){
  const el=document.getElementById('adminList');
  if(!el)return;
  if(!DB){el.innerHTML=`<div class="card" style="text-align:center;color:#888;font-size:13px">Firebase 연결 없음</div>`;return;}
  DB.ref('structure_disputes').once('value',snap=>{
    if(!el)return;
    const items=[];
    snap.forEach(ch=>{const v=ch.val();if(v.status==='pending')items.push({key:ch.key,...v});});
    if(!items.length){
      el.innerHTML=`<div class="card" style="text-align:center;color:#888;font-size:13px">📭 검토 대기 이의신청이 없습니다.</div>`;
      return;
    }
    el.innerHTML=items.map(item=>`
      <div class="admin-row" id="ar_${item.key.replace(/\W/g,'_')}">
        <div class="admin-meta">${item.name} &nbsp;·&nbsp; ${item.setTitle} &nbsp;·&nbsp; ${new Date(item.date).toLocaleDateString('ko-KR')}</div>
        <div class="admin-sent">${item.sentence}</div>
        <div class="admin-ans-box">
          <div class="admin-ans-lbl" style="color:#16a34a">✅ 정답 순서</div>
          <div class="admin-ans-val" style="color:#1B3A5C">${item.correctAnswer}</div>
          <div class="admin-ans-lbl mt8" style="color:#dc2626">❌ 학생 답안</div>
          <div class="admin-ans-val" style="color:#dc2626">${item.studentAnswer}</div>
        </div>
        <div class="admin-btn-row">
          <button type="button" class="btn bGreen" onclick="resolveDispute('${item.key}','approved')">✅ 정답 처리</button>
          <button type="button" class="btn br" onclick="resolveDispute('${item.key}','rejected')">❌ 오답 유지</button>
        </div>
      </div>`).join('');
  });
}

function resolveDispute(key,verdict){
  if(!DB)return;
  DB.ref(`structure_disputes/${key}`).update({status:verdict,resolvedAt:new Date().toISOString()});
  const el=document.getElementById('ar_'+key.replace(/\W/g,'_'));
  if(el){
    el.style.opacity='.4';
    el.querySelector('.admin-btn-row').innerHTML=`<div style="text-align:center;width:100%;font-weight:700;font-size:13px;padding:8px;color:${verdict==='approved'?'#16a34a':'#dc2626'}">${verdict==='approved'?'✅ 정답 처리 완료':'❌ 오답 유지 처리 완료'}</div>`;
  }
}

function login(){const e=document.getElementById('nameInput'),n=e?e.value.trim():'';if(!n){alert('이름을 입력해주세요');return;}S.name=n;S.sc='select';R();}

function setMode(m){S.mode=m;R();}

function startSet(id){
  if(S.mode==='drill') startDrill(id);
  else startQuiz(id);
}

function startQuiz(id){
  const f=SETS.find(s=>s.id===id);if(!f)return;
  S.set=f;S.qi=0;S.score=0;S.results=[];S.sc='quiz';

  /* 테스트 모드: 출제 비율에 따라 문제 샘플링 */
  if(S.mode==='test'){
    const all=f.questions;
    const count=Math.max(1,Math.round(all.length*sampleRate));
    S.testQuestions=shuffle([...all]).slice(0,count);

  }

}

/* ── drill 모드 시작 ── */
function startDrill(id){
  const f=SETS.find(s=>s.id===id);if(!f)return;
  S.set=f;
  S.drillMode=true;
  S.drillQuestions=buildDrillQuestions(f.questions);
  S.drillQi=0;
  S.drillResults=[];
  S.sc='drill';
  initDrillQ();R();
}

/* 기존 questions 배열 → drill 문제 JSON 배열로 변환 (Phase1: basic arrange만) */
function buildDrillQuestions(questions){
  const setId=S.set?S.set.id:'';
  const tagSet=DRILL_TAG_MAP[setId]||{};

  return questions.map(q=>{
    const tag=tagSet[q.id]||{primaryFocus:'SV',stage:'basic',drill:'DRILL_SV_CORE',minorTag:'SV_MAIN_VERB'};
    const pf=tag.primaryFocus;
    const stage=tag.stage;
    const drill=tag.drill;

    /* 청크 객체 생성 */
    const chunks=q.chunks.map((text,i)=>({
      id:`c${i+1}`, text, label:q.labels[i]||'', state:'active', group:null
    }));

    /* 수식어 계열 라벨 */
    const MOD_LABELS=['Mod','Adv.Cl','Rel.Cl','Inf','Part'];
    const CORE_LABELS=['S','V','O','C','IO','DO','OC'];
    const modChunks  =chunks.filter(c=>MOD_LABELS.includes(c.label));
    const coreChunks =chunks.filter(c=>CORE_LABELS.includes(c.label));

    /* 정답 순서: 원본 chunks 순서 기준 */
    const fullAnswer={
      order: chunks.map(c=>c.id),
      roles: Object.fromEntries(chunks.map(c=>[c.id,c.label]))
    };
    const coreAnswer={
      order: coreChunks.map(c=>c.id),
      roles: Object.fromEntries(coreChunks.map(c=>[c.id,c.label]))
    };

    let steps=[];

    /* ── primaryFocus별 step 설계 ── */

    if(pf==='SV'){
      /* SV: 수식어(Mod/Adv.Cl/Rel.Cl/Inf/Part)만 hidden, O/C는 남김 */
      const svChunks=chunks.map(c=>({...c, state: MOD_LABELS.includes(c.label)?'hidden':'active'}));
      /* 정답: hidden 제외한 나머지 (S/V/O/C 등) 원래 순서 유지 */
      const svVisible=chunks.filter(c=>!MOD_LABELS.includes(c.label));
      const svAnswer={
        order: svVisible.map(c=>c.id),
        roles: Object.fromEntries(svVisible.map(c=>[c.id,c.label]))
      };
      steps=[{
        stepId:1,
        instruction:'주어(S)와 동사(V)를 먼저 잡고, 뼈대를 순서대로 놓아보세요. 흐린 조각은 설명(수식어)이에요.',
        chunks:svChunks, task:'arrange', selectionType:null,
        answer: svAnswer,
        hint:{labelVisible:false, lockedPositions:[]}
      }];

    } else if(pf==='MOD'){
      if(stage==='basic'||modChunks.length===0){
        /* basic: 수식어 dimmed로 흐리게, 전체 배열 */
        const dimmedChunks=chunks.map(c=>({...c, state: MOD_LABELS.includes(c.label)?'dimmed':'active'}));
        steps=[{
          stepId:1,
          instruction:'문장 조각을 올바른 순서로 놓아보세요. 흐린 조각은 설명(수식어)이에요 — 주어·동사 뼈대에 집중하세요!',
          chunks:dimmedChunks, task:'arrange', selectionType:null,
          answer:fullAnswer,
          hint:{labelVisible:false, lockedPositions:[]}
        }];
      } else {
        /* mixed: step1 수식어 선택(제거), step2 뼈대 배열 */
        steps=[
          {
            stepId:1,
            instruction:'설명(수식어) 조각을 모두 찾아 탭하세요. (여러 개 선택 가능)',
            chunks:chunks.map(c=>({...c,state:'active'})),
            task:'select', selectionType:'multiple', selectEffect:'remove',
            answer:{order:modChunks.map(c=>c.id), roles:Object.fromEntries(modChunks.map(c=>[c.id,c.label]))},
            hint:{labelVisible:false, lockedPositions:[]}
          },
          {
            stepId:2,
            instruction:'설명 조각을 걷어낸 뒤, 남은 뼈대를 주어 → 동사 순서로 놓아보세요.',
            chunks:chunks.map(c=>({...c, state: MOD_LABELS.includes(c.label)?'hidden':'active'})),
            task:'arrange', selectionType:null,
            /* 정답: MOD_LABELS 제외한 나머지 청크 순서 — label 무관하게 원본 순서 유지 */
            answer:(()=>{
              const visible=chunks.filter(c=>!MOD_LABELS.includes(c.label));
              return {
                order: visible.map(c=>c.id),
                roles: Object.fromEntries(visible.map(c=>[c.id,c.label]))
              };
            })(),
            hint:{labelVisible:false, lockedPositions:[]}
          }
        ];
      }

    } else if(pf==='CLAUSE'){
      /* CLAUSE: 절을 grouped 하나의 덩어리로 제공, 전체 배열 */
      const clauseLabels=['Adv.Cl','Rel.Cl','Inf'];
      const groupedChunks=chunks.map(c=>({
        ...c,
        state: clauseLabels.includes(c.label)?'grouped':'active',
        group: clauseLabels.includes(c.label)?'clause':null
      }));
      steps=[{
        stepId:1,
        instruction:'파란 테두리 조각은 하나의 절(덩어리)이에요. 덩어리째 순서대로 놓아보세요.',
        chunks:groupedChunks, task:'arrange', selectionType:null,
        answer:fullAnswer,
        hint:{labelVisible:false, lockedPositions:[]}
      }];

    } else if(pf==='MOVE'){
      /* MOVE: step1 주어 선택, step2 정상 어순 배열 */
      /* 진짜 주어: 실S 우선, 없으면 S. 가S(가주어)는 정답에서 제외 */
      const realSChunks=chunks.filter(c=>c.label==='실S');
      const sChunks=realSChunks.length>0 ? realSChunks : chunks.filter(c=>c.label==='S');
      steps=[
        {
          stepId:1,
          instruction: (tag.minorTag==='MOVE_IT_THAT')?'강조된 진짜 주어(S)를 찾아 탭하세요.'
                        :(tag.minorTag==='MOVE_INV')?'이 문장의 주어(S)를 찾아 탭하세요. (도치에 주의!)'
                        :'이 문장의 진짜 주어(S)를 찾아 탭하세요.',
          chunks:chunks.map(c=>({...c,state:'active'})),
          task:'select', selectionType:'single', selectEffect:'lock',
          answer:{
            order: sChunks.map(c=>c.id),
            roles: Object.fromEntries(sChunks.map(c=>[c.id,c.label]))
          },
          hint:{labelVisible:false, lockedPositions:[]}
        },
        {
          stepId:2,
          instruction:'주어(S) → 동사(V) 순서를 확인하며, 문장 조각을 올바른 순서로 놓아보세요.',
          chunks:chunks.map(c=>({...c,state:'active'})),
          task:'arrange', selectionType:null,
          answer:fullAnswer,
          hint:{labelVisible:false, lockedPositions:[]}
        }
      ];

    } else if(pf==='OC'){
      /* OC: 수식어 dimmed, O·C 중심 배열 */
      const ocChunks=chunks.map(c=>({
        ...c,
        state: (c.label==='Mod'||c.label==='Adv.Cl')?'dimmed':'active'
      }));
      steps=[{
        stepId:1,
        instruction:'목적어(O)와 보어(C)가 어디에 오는지 집중하며 순서대로 놓아보세요.',
        chunks:ocChunks, task:'arrange', selectionType:null,
        answer:fullAnswer,
        hint:{labelVisible:false, lockedPositions:[]}
      }];

    } else if(pf==='VERB_FORM'){
      /* VERB_FORM: step1 동사 선택, step2 전체 배열 */
      const vChunks=chunks.filter(c=>c.label==='V');
      steps=[
        {
          stepId:1,
          instruction:'이 문장의 동사(V)를 찾아 탭하세요. (준동사인지 본동사인지 확인!)',
          chunks:chunks.map(c=>({...c,state:'active'})),
          task:'select', selectionType:'single', selectEffect:'lock',
          answer:{
            order: vChunks.map(c=>c.id),
            roles: Object.fromEntries(vChunks.map(c=>[c.id,c.label]))
          },
          hint:{labelVisible:false, lockedPositions:[]}
        },
        {
          stepId:2,
          instruction:'동사(V)를 확인했으니, 이제 주어 → 동사 순서로 전체 문장을 완성해보세요.',
          chunks:chunks.map(c=>({...c,state:'active'})),
          task:'arrange', selectionType:null,
          answer:fullAnswer,
          hint:{labelVisible:false, lockedPositions:[]}
        }
      ];

    } else {
      /* 기본 fallback: 전체 배열 */
      steps=[{
        stepId:1,
        instruction:'주어 → 동사 순서로 뼈대를 먼저 잡고, 문장 조각을 완성해보세요.',
        chunks:chunks.map(c=>({...c,state:'active'})),
        task:'arrange', selectionType:null,
        answer:fullAnswer,
        hint:{labelVisible:false, lockedPositions:[]}
      }];
    }

    return {
      questionId: q.id+'_drill',
      sourceSentenceId: q.id,
      sourceSentence: q.sentence,
      primaryFocus: pf,
      stage,
      drill,
      uiMode: steps.length>1?'stepwise':(steps[0].task==='select'?'select_then_arrange':'arrange'),
      concept: q.concept||'',
      explanation: q.explanation||'',
      steps
    };
  });
}

function initDrillQ(){
  const dq=S.drillQuestions[S.drillQi];
  S.currentDrillQ=dq;
  S.currentStep=0;
  S.totalSteps=dq.steps.length;
  S.stepResults=[];
  S.selectedChunks=[];
  S.lockedChunks=[];
  S.removedChunks=[];
  initDrillStep();
}

function initDrillStep(){
  const stepData=S.currentDrillQ.steps[S.currentStep];
  /* chunkStates 초기화 — 우선순위: locked > hidden > JSON state */
  S.chunkStates={};
  stepData.chunks.forEach(c=>{
    let state=c.state;
    if(S.removedChunks.includes(c.id)) state='hidden';
    if(S.lockedChunks.includes(c.id))  state='locked';
    S.chunkStates[c.id]=state;
  });
  /* bankOrder/answerOrder: stepData.chunks의 인덱스 기준 (quiz와 동일 방식) */
  const lockedIdx=stepData.chunks.map((c,i)=>({c,i}))
    .filter(({c})=>S.chunkStates[c.id]==='locked').map(({i})=>i);
  const activeIdx=stepData.chunks.map((c,i)=>({c,i}))
    .filter(({c})=>['active','dimmed','grouped'].includes(S.chunkStates[c.id])).map(({i})=>i);
  S.answerOrder=[...lockedIdx];        /* locked → answer zone에 순서대로 */
  S.bankOrder=shuffle([...activeIdx]); /* active → bank에 섞어서 */
  S.submitted=false;S.lastOk=false;S.showNext=false;
}
/* 현재 문제 반환 (테스트: 샘플링 배열 / 학습: 원본 배열) */
function curQ(){return S.testQuestions?S.testQuestions[S.qi]:S.set.questions[S.qi];}
function totQ(){return S.testQuestions?S.testQuestions.length:S.set.questions.length;}

function initQ(){
  const q=curQ();
  S.bankOrder=shuffle(q.chunks.map((_,i)=>i));S.answerOrder=[];
  S.attempts=0;S.submitted=false;S.lastOk=false;S.showExpl=false;S.showNext=false;S.hintCollapsed=false;
  S.grammarShown=false;S.grammarSelected=null;S.grammarDone=false;S.grammarTransition=false;
  S.showLabels=(S.mode==='study');  /* 학습 모드: 라벨 기본 ON, 테스트/훈련: OFF */
}

function clickBank(p){if(S.submitted)return;moveChunk('bank',p,'ans',S.answerOrder.length);}
function clickAns(p){if(S.submitted)return;moveChunk('ans',p,'bank',S.bankOrder.length);}
function resetChunks(){if(S.submitted)return;S.bankOrder=shuffle(curQ().chunks.map((_,i)=>i));S.answerOrder=[];R();}
function toggleLabels(v){S.showLabels=v;R();}
function showExpl(){S.showExpl=true;R();}

/* ── 연계 문법 문제 UI 생성 ── */
function linkedGrammarUI(lg, tp){
  if(!lg) return '';

  /* ── 버튼만 보이는 상태 ── */
  if(!S.grammarShown){
    if(S.grammarTransition){
      /* 전환 중간 브릿지 화면 */
      return`<div style="
          margin-top:14px;padding:18px 16px;
          border-radius:14px;
          background:linear-gradient(135deg,#fff7ed,#fef3c7);
          border:2px solid #fed7aa;
          text-align:center;
          animation:fadeIn .3s ease;
        ">
        <div style="font-size:22px;margin-bottom:8px">🎯</div>
        <div style="font-size:14px;font-weight:800;color:#9a3412;margin-bottom:4px">
          방금 만든 문장이 시험에는 어떻게 나올까요?
        </div>
        <div style="font-size:12px;color:#c2410c">잠깐, 도전해봐요!</div>
      </div>`;
    }
    return`<div style="margin-top:14px;padding-top:14px;border-top:2px dashed #e2e8f0">
      <button type="button" class="btn" onclick="showGrammar()"
        style="background:#fff7ed;border:2px solid #ea580c;color:#ea580c;font-size:13px;font-weight:800;padding:12px;letter-spacing:.2px">
        이 문장, 시험에는 이렇게 나와요! →
      </button>
    </div>`;
  }

  /* stem 에서 [___] 강조 */
  const stemHtml=lg.stem.replace(/\[([^\]]+)\]/g,
    '<span style="font-weight:800;color:#1B3A5C;background:#dbeafe;padding:1px 6px;border-radius:4px">[$1]</span>');

  /* 선택지 */
  const optionsHtml=lg.options.map(opt=>{
    let style='display:block;width:100%;padding:11px 14px;margin-bottom:8px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:left;border:2px solid;transition:all .15s;';
    if(S.grammarDone){
      if(opt===lg.answer) style+='border-color:#16a34a;background:#f0fdf4;color:#16a34a;';
      else if(opt===S.grammarSelected) style+='border-color:#dc2626;background:#fff5f5;color:#dc2626;';
      else style+='border-color:#e2e8f0;background:#f8fafc;color:#94a3b8;';
    } else {
      const isSel=S.grammarSelected===opt;
      style+=isSel?'border-color:#ea580c;background:#fff7ed;color:#ea580c;':'border-color:#e2e8f0;background:#fff;color:#1e293b;';
    }
    const icon=S.grammarDone?(opt===lg.answer?'✅ ':opt===S.grammarSelected?'❌ ':''):'';
    const click=S.grammarDone?'':` onclick="selectGrammar('${opt.replace(/'/g,"\\'")}')"`; 
    return`<button type="button" style="${style}"${click}>${icon}${opt}</button>`;
  }).join('');

  /* 제출 버튼 */
  const submitBtn=(!S.grammarDone&&S.grammarSelected)
    ?`<button type="button" class="btn mt8" style="background:#ea580c;color:#fff;font-weight:800" onclick="submitGrammar()">확인</button>`:'';

  /* 오답 피드백 */
  const wrongMsg=(S.grammarDone&&S.grammarSelected!==lg.answer&&tp)
    ?`<div style="
        margin-bottom:10px;padding:10px 12px;
        background:#fff5f5;border-radius:10px;
        border-left:3px solid #dc2626;
        font-size:12px;color:#991b1b;line-height:1.7;
      ">
      💡 ${getGrammarWrongMsg(tp)}
    </div>`
    :'';

  /* 3단계 해설 */
  const explHtml=S.grammarDone?`
    <div style="margin-top:12px;background:#eff6ff;border-radius:10px;padding:14px;border:1px solid #bfdbfe">
      <div style="font-size:10px;font-weight:800;color:#1B3A5C;letter-spacing:.5px;margin-bottom:10px">📖 구조 기반 해설</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;gap:8px;align-items:flex-start">
          <span style="flex-shrink:0;font-size:10px;font-weight:800;background:#1B3A5C;color:#fff;border-radius:4px;padding:2px 6px;margin-top:2px">구조</span>
          <span style="font-size:13px;color:#1e40af;line-height:1.65">${lg.explanation.structure}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start">
          <span style="flex-shrink:0;font-size:10px;font-weight:800;background:#0891b2;color:#fff;border-radius:4px;padding:2px 6px;margin-top:2px">규칙</span>
          <span style="font-size:13px;color:#1e40af;line-height:1.65">${lg.explanation.rule}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start">
          <span style="flex-shrink:0;font-size:10px;font-weight:800;background:#16a34a;color:#fff;border-radius:4px;padding:2px 6px;margin-top:2px">정답</span>
          <span style="font-size:13px;color:#1e40af;line-height:1.65">${lg.explanation.connection}</span>
        </div>
      </div>
    </div>`:'';

  /* ── 문법 영역 — 시각적으로 다른 레이어 표시 ── */
  return`<div style="
      margin-top:14px;
      padding:14px;
      border-radius:14px;
      background:#fff7ed;
      border:2px solid #fed7aa;
    ">
    <!-- 실전 적용 배지 -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="
        font-size:10px;font-weight:800;letter-spacing:.5px;
        background:#ea580c;color:#fff;
        border-radius:6px;padding:3px 9px;
      ">실전 적용</span>
      <span style="font-size:11px;color:#9a3412;font-weight:600">방금 배운 구조, 시험에서는 이렇게 나와요</span>
    </div>
    <div style="font-size:12px;color:#7c2d12;margin-bottom:8px;font-weight:600">${lg.question}</div>
    <div style="
      font-size:14px;color:#1e293b;line-height:1.75;
      background:#fff;border-radius:10px;
      padding:12px;margin-bottom:12px;
      border:1px solid #fed7aa;
    ">${stemHtml}</div>
    ${optionsHtml}
    ${submitBtn}
    ${wrongMsg}
    ${explHtml}
  </div>`;
}

function showGrammar(){
  S.grammarTransition=true; R();
  setTimeout(()=>{S.grammarShown=true;S.grammarTransition=false;R();}, 900);
}
function selectGrammar(opt){if(S.grammarDone)return;S.grammarSelected=opt;R();}
/* TP별 오답 피드백 메시지 */
const GRAMMAR_WRONG_MSG={
  TP01:'방금 구조 훈련에서 동사(V) 자리를 찾으셨죠? 그 자리는 동사원형이어야 해요. 명령문은 주어 없이 동사원형으로 시작해요!',
  TP03:'분사 자리예요. 방금 찾은 구조에서 이 명사가 "하는" 것인지 "되는" 것인지 생각해보세요. 능동이면 v-ing, 수동이면 p.p.예요.',
  TP05:'방금 구조에서 이 자리 전후를 확인해보세요. 전치사 뒤엔 동명사(v-ing), 명사를 수식하거나 진주어엔 to-v가 와요.',
  TP10:'관계사 자리예요. 절 안에 빠진 문장 성분이 있는지 확인해보세요. 목적어나 주어가 빠지면 what, 선행사 있으면 that/which예요.',
  TP12:'방금 동사를 찾으셨죠? 그 동사가 2형식이면 뒤에 보어가 와요. 보어 자리엔 형용사, 동사를 꾸밀 때만 부사를 써요.',
  TP19:'5형식 동사 자리예요. 방금 찾은 목적어 뒤가 목적격보어 자리예요. ask/tell/cause 같은 동사는 to-v를 목적격보어로 취해요.',
  TP22:'수식어 사이에서 진짜 주어를 찾는 거예요. 방금 S 자리를 찾으셨죠? 그 주어의 수에 동사를 맞춰야 해요.',
  TP26:'동명사구나 to부정사구가 주어일 때는 단수 취급해요. 방금 주어 자리를 찾으셨죠? 길어 보여도 하나의 덩어리예요.',
  TP27:'방금 구조에서 주어와 동사의 관계를 보세요. 주어가 "하는" 것이면 능동, "되는" 것이면 수동(be + p.p.)이에요.',
  TP29:'시제를 확인해보세요. 같은 시점의 과거 사건은 단순과거, 그보다 이전 사건은 과거완료(had + p.p.)를 써요.',
  TP32:'가정법이에요. 현재·미래 반대 가정은 if절에 과거형, 과거 반대 가정은 if절에 과거완료(had + p.p.)를 써요.',
};
function submitGrammar(){
  if(!S.grammarSelected||S.grammarDone)return;
  S.grammarDone=true;
  R();
}
function getGrammarWrongMsg(tp){
  return GRAMMAR_WRONG_MSG[tp]||'앞에서 찾은 주어·동사 구조를 다시 떠올려보세요. 구조가 보이면 답이 보여요!';
}

function submitAnswer(){
  const q=curQ();
  const correct=q.chunks.map((_,i)=>i);
  const isOk=JSON.stringify(S.answerOrder)===JSON.stringify(correct);
  S.attempts++;S.submitted=true;S.lastOk=isOk;S.showNext=false;
  /* 오답 시 힌트 자동 펼침 */
  if(!isOk) S.hintCollapsed=false;
  const sa=S.answerOrder.map(ci=>q.chunks[ci]).join(' / ');
  const ca=q.chunks.join(' / ');
  if(isOk){
    const pts=S.mode==='study'?(S.attempts===1?2:1):2;
    S.score+=pts;
    S.results.push({qi:S.qi,correct:true,attempts:S.attempts,pts,disputed:false,studentAnswer:sa,correctAnswer:ca});
  } else if(S.mode==='test'||(S.mode==='study'&&S.attempts>=2)){
    S.results.push({qi:S.qi,correct:false,attempts:S.attempts,pts:0,disputed:false,studentAnswer:sa,correctAnswer:ca});
  }
  R();
  /* 1초 후 다음 버튼 표시 */
  setTimeout(()=>{if(S.submitted){S.showNext=true;R();}},1000);
}

function retryQ(){S.submitted=false;S.lastOk=false;S.showNext=false;R();}

function disputeQ(){
  const q=S.set.questions[S.qi];
  const r=S.results.find(x=>x.qi===S.qi);
  if(!r||r.disputed)return;
  r.disputed=true;
  if(DB){
    DB.ref(`structure_disputes/${sKey(S.name)}_${S.set.id}_q${S.qi}_${Date.now()}`).set({
      name:S.name,setId:S.set.id,setTitle:S.set.title,
      qi:S.qi,questionId:q.id,sentence:q.sentence,
      correctAnswer:q.chunks.join(' / '),studentAnswer:r.studentAnswer,
      status:'pending',date:new Date().toISOString()
    });
  }
  R();
}

function nextQ(){S.qi++;initQ();R();}
function finishQuiz(){
  if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}
  if(S.results.length<totQ()){
    const q=curQ();
    S.results.push({qi:S.qi,correct:S.lastOk,attempts:S.attempts,pts:0,disputed:false,
      studentAnswer:S.answerOrder.map(ci=>q.chunks[ci]).join(' / '),correctAnswer:q.chunks.join(' / ')});
  }
  S.sc='result';R();
}
function retakeSet(){if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}startQuiz(S.set.id);}

function retakeWrong(){
  if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}
  const qList=S.testQuestions||S.set.questions;
  const wrongQs=S.results
    .map((r,i)=>({r,q:qList[i]}))
    .filter(({r})=>r.pts===0&&!r.disputed&&!r.approved)
    .map(({q})=>q);
  if(!wrongQs.length) return;
  S.qi=0; S.score=0; S.results=[];
  S.testQuestions=wrongQs;
  S.sc='quiz';
  initQ(); /* ← 필수: submitted/lastOk/attempts/showNext 등 이전 상태 초기화 */
  R();
}
function backToSelect(){if(window._sfDisputeRef){window._sfDisputeRef.off();window._sfDisputeRef=null;}S.sc='select';R();}

/* ════════════════════════════════════════════════════════════
   드래그 앤 드롭
   ════════════════════════════════════════════════════════════ */
const D={active:false,srcZone:null,srcPos:null,ci:null,ghost:null,touchEl:null,moved:false,touchStartX:0,touchStartY:0};
function bindDrag(){
  const az=document.getElementById('ans-zone'),bz=document.getElementById('bank-zone');
  if(!az||!bz)return;
  document.querySelectorAll('.ck[draggable]').forEach(el=>{
    el.addEventListener('dragstart',onDS);el.addEventListener('dragend',onDE);
    el.addEventListener('dragover',onCDO);el.addEventListener('drop',onCD);
    el.addEventListener('touchstart',onTS,{passive:true});
  });
  az.addEventListener('dragover',e=>{e.preventDefault();az.classList.add('drag-over');});
  az.addEventListener('dragleave',e=>{if(!az.contains(e.relatedTarget))az.classList.remove('drag-over');});
  az.addEventListener('drop',onZD);
  bz.addEventListener('dragover',e=>{e.preventDefault();bz.classList.add('drag-over');});
  bz.addEventListener('dragleave',e=>{if(!bz.contains(e.relatedTarget))bz.classList.remove('drag-over');});
  bz.addEventListener('drop',onBD);
}
function onDS(e){const el=e.currentTarget;D.srcZone=el.dataset.zone;D.srcPos=+el.dataset.pos;D.ci=+el.dataset.ci;D.active=true;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(D.ci));setTimeout(()=>el.classList.add('dragging'),0);}
function onDE(){D.active=false;document.querySelectorAll('.ck.dragging,.drag-over,.drop-indicator').forEach(el=>{el.classList.remove('dragging','drag-over');if(el.classList.contains('drop-indicator'))el.remove();});}
function onCDO(e){e.preventDefault();e.stopPropagation();const t=e.currentTarget;if(t.dataset.zone!=='ans')return;document.querySelectorAll('.drop-indicator').forEach(el=>el.remove());const rect=t.getBoundingClientRect();const ind=document.createElement('div');ind.className='drop-indicator';if(e.clientX<rect.left+rect.width/2)t.parentNode.insertBefore(ind,t);else t.parentNode.insertBefore(ind,t.nextSibling);}
function onCD(e){e.preventDefault();e.stopPropagation();if(!D.active)return;const t=e.currentTarget;const rect=t.getBoundingClientRect();moveChunk(D.srcZone,D.srcPos,t.dataset.zone,e.clientX<rect.left+rect.width/2?+t.dataset.pos:+t.dataset.pos+1);}
function onZD(e){e.preventDefault();document.getElementById('ans-zone').classList.remove('drag-over');document.querySelectorAll('.drop-indicator').forEach(el=>el.remove());if(!D.active)return;moveChunk(D.srcZone,D.srcPos,'ans',S.answerOrder.length);}
function onBD(e){e.preventDefault();document.getElementById('bank-zone').classList.remove('drag-over');if(!D.active||D.srcZone==='bank')return;moveChunk(D.srcZone,D.srcPos,'bank',S.bankOrder.length);}
function onTS(e){
  const el=e.currentTarget;
  /* 청크 요소인지 확인 */
  if(!el.dataset.zone) return;
  D.srcZone=el.dataset.zone;D.srcPos=+el.dataset.pos;D.ci=+el.dataset.ci;
  D.touchEl=el;
  const t=e.touches[0];
  D.touchStartX=t.clientX;D.touchStartY=t.clientY;
  D.moved=false;D.active=false;D.ghost=null;
}
function onTM(e){
  const t=e.touches[0];
  const dx=t.clientX-D.touchStartX, dy=t.clientY-D.touchStartY;
  if(!D.active && Math.sqrt(dx*dx+dy*dy)>8){
    /* 드래그 시작 */
    D.active=true;D.moved=true;
    const el=D.touchEl;
    const g=document.createElement('div');
    g.id='drag-ghost';g.textContent=el.textContent.trim();
    g.style.left=t.clientX+'px';g.style.top=t.clientY+'px';
    document.body.appendChild(g);D.ghost=g;
    el.classList.add('dragging');
  }
  if(!D.active||!D.ghost)return;
  e.preventDefault();
  D.ghost.style.left=t.clientX+'px';D.ghost.style.top=t.clientY+'px';
  D.ghost.style.display='none';
  const un=document.elementFromPoint(t.clientX,t.clientY);
  D.ghost.style.display='';
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const z=un&&un.closest('#ans-zone,#bank-zone');
  if(z)z.classList.add('drag-over');
}
function onTE(e){
  /* touchEl이 없으면 청크 터치가 아님 — 무시 */
  if(!D.touchEl) return;

  const t=e.changedTouches[0];
  /* 고스트 정리 */
  if(D.ghost){D.ghost.remove();D.ghost=null;}
  if(D.touchEl)D.touchEl.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));

  if(!D.moved){
    /* 탭 — 클릭과 동일하게 처리 */
    const zone=D.srcZone, pos=D.srcPos;
    D.touchEl=null; D.active=false; D.moved=false;
    if(S.submitted)return;
    if(zone==='bank') clickBank(pos);
    else if(zone==='ans') clickAns(pos);
    return;
  }

  /* 드래그 끝 — 기존 드롭 로직 */
  D.touchEl=null;
  if(!D.active){D.moved=false;return;}
  const un=document.elementFromPoint(t.clientX,t.clientY);
  if(!un){D.active=false;D.moved=false;return;}
  const tc=un.closest('.ck[data-zone]');
  if(tc){
    const r=tc.getBoundingClientRect();
    moveChunk(D.srcZone,D.srcPos,tc.dataset.zone,t.clientX<r.left+r.width/2?+tc.dataset.pos:+tc.dataset.pos+1);
    D.active=false;D.moved=false;return;
  }
  const tz=un.closest('#ans-zone')?'ans':un.closest('#bank-zone')?'bank':null;
  if(tz)moveChunk(D.srcZone,D.srcPos,tz,tz==='ans'?S.answerOrder.length:S.bankOrder.length);
  D.active=false;D.moved=false;
}
document.addEventListener('touchmove',onTM,{passive:false});
document.addEventListener('touchend',onTE);
function moveChunk(sz,sp,dz,dp){let ci;if(sz==='bank')ci=S.bankOrder.splice(sp,1)[0];else ci=S.answerOrder.splice(sp,1)[0];if(dz==='ans'){const adj=(sz==='ans'&&sp<dp)?dp-1:dp;S.answerOrder.splice(Math.max(0,Math.min(adj,S.answerOrder.length)),0,ci);}else{S.bankOrder.push(ci);}R();
  /* 스냅 애니메이션: 답안 구역에 놓인 마지막 청크에 적용 */
  if(dz==='ans'){requestAnimationFrame(()=>{const els=document.querySelectorAll('#ans-zone .ck');if(els.length){const t=els[Math.min(dp,els.length-1)];t.classList.remove('ck-snap');void t.offsetWidth;t.classList.add('ck-snap');}});} }

R();
</script>
